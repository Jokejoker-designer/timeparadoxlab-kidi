<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TimeParadoxLab — 5D Singularity Simulator (standalone)</title>
<style>
:root {
  color-scheme: dark;
  --bg: #070a11;
  --panel: #0e1420;
  --panel-2: #131b2b;
  --border: #1e2840;
  --text: #d6e2f5;
  --muted: #8ea4c6;
  --cyan: #3fd0ff;
  --violet: #aa78ff;
  --teal: #56e39f;
  --magenta: #e23bd0;
  --amber: #ffd23b;
  --orange: #ff7a3b;
  --red: #ff6b6b;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: radial-gradient(1200px 600px at 30% -10%, #101a2e 0%, var(--bg) 60%);
  color: var(--text);
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  font-size: 13px;
}

.lab { width: min(100vw, 2200px); max-width: none; margin: 0 auto; padding: 14px clamp(14px, 1.4vw, 28px) 32px; }

.lab-header {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 24px;
  border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 14px;
}
.lab-header h1 { margin: 0; font-size: clamp(22px, 1.5vw, 32px); letter-spacing: 0.5px;
  background: linear-gradient(90deg, var(--cyan), var(--violet)); -webkit-background-clip: text;
  background-clip: text; color: transparent; }
.subtitle { color: var(--muted); margin-top: 4px; font-family: ui-monospace, monospace; font-size: 12px; }
.disclaimer { max-width: 520px; font-size: 11px; color: #a9b6d8; background: var(--panel);
  border: 1px solid var(--border); border-left: 3px solid var(--amber); padding: 8px 10px; border-radius: 6px; }

/* wide three-column dashboard: controls | main visuals | diagnostics */
.lab-grid {
  display: grid;
  grid-template-columns: minmax(320px, 360px) minmax(560px, 1fr) minmax(300px, 380px);
  gap: 16px; align-items: start;
}
@media (min-width: 1700px) {
  .lab { width: calc(100vw - 32px); max-width: 2300px; }
  .lab-grid { grid-template-columns: minmax(330px, 380px) minmax(680px, 1fr) minmax(330px, 410px); gap: 18px; }
}
@media (max-width: 1200px) {
  .lab-grid { grid-template-columns: 1fr; }
  .lab { width: 100%; padding: 12px; }
}

.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
.panel h3 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

/* controls */
.ctl-block { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px dashed var(--border); }
.ctl-block:last-child { border-bottom: none; margin-bottom: 0; }
.ctl-title { font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.phase-buttons { display: flex; flex-direction: column; gap: 6px; }
button { cursor: pointer; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
  border-radius: 7px; padding: 7px 10px; font-size: 12px; transition: all 0.12s; font-family: inherit; }
button:hover { border-color: var(--cyan); }
button.phase { text-align: left; }
button.phase.active { border-color: var(--cyan); background: #17263d; box-shadow: 0 0 0 1px var(--cyan) inset; }
.phase-blurb { margin-top: 8px; font-size: 11px; color: #a9b6d8; line-height: 1.5; }
input[type="range"] { width: 100%; accent-color: var(--cyan); }
input[type="number"] { width: 64px; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 6px; margin-left: 5px; font-family: ui-monospace, monospace; }
select { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 5px;
  padding: 3px 6px; margin-left: 5px; font-family: inherit; }
.ctl-row { display: flex; gap: 14px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
.ctl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ctl-grid label, .ctl-row label { font-size: 11px; color: var(--muted); display: flex; align-items: center; }
label.checkbox { gap: 5px; }
.transport { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.speed { display: flex; flex-direction: column; font-size: 10px; color: var(--muted); flex: 1; min-width: 90px; }
.test-btn { width: 100%; border-color: var(--teal); }
.test-results { margin-top: 10px; font-family: ui-monospace, monospace; font-size: 10.5px; }
.test-summary { font-weight: bold; padding: 5px 8px; border-radius: 5px; margin-bottom: 6px; }
.test-summary.ok { background: rgba(86,227,159,0.12); color: var(--teal); }
.test-summary.fail { background: rgba(255,107,107,0.12); color: var(--red); }
.test-row { padding: 3px 0; line-height: 1.4; }
.test-row.pass { color: #9fe8c4; }
.test-row.fail { color: var(--red); }
.test-detail { color: var(--muted); }

/* center */
.col-center { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
.slice-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 760px) { .slice-row { grid-template-columns: 1fr; } }
.canvas-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 8px; min-width: 0; }
canvas { background: #0a0e16; border: 1px solid var(--border); display: block; }

/* panel head (shared) */
.panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.panel-head h3 { margin: 0; }
.domain-pill { font-family: ui-monospace, monospace; font-size: 10.5px; font-weight: bold; }

/* 3D volume */
.volume-wrap { padding: 12px; min-width: 0; }
.volume3d { display: flex; flex-direction: column; }
.volume3d-canvas { width: 100%; overflow: hidden; border-radius: 10px; }
.volume3d-hint { margin-top: 6px; font-size: 10.5px; color: var(--muted); font-family: ui-monospace, monospace; }
.webgl-fallback { padding: 28px; color: var(--amber); background: #141a26; border: 1px dashed var(--border);
  border-radius: 10px; font-size: 13px; }
.webgl-fallback-sub { margin-top: 8px; color: var(--muted); font-size: 12px; }

/* camera presets */
.preset-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
button.preset { font-size: 11px; padding: 6px 8px; }
button.preset.active { border-color: var(--violet); background: #1b1733; box-shadow: 0 0 0 1px var(--violet) inset; }

/* layer toggles */
.layer-toggles { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin: 0; }
.layer-toggles legend { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 4px; }
.layer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 10px; }
.layer-check { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text); }

/* slider twins + misc controls */
.slider-twin { display: flex; align-items: center; gap: 8px; }
.slider-twin input[type="range"] { flex: 1; }
.twin-label { font-size: 11px; color: var(--muted); }
.phase-key { display: inline-block; min-width: 14px; padding: 0 3px; margin-right: 4px; border-radius: 3px;
  background: #0a1422; border: 1px solid var(--border); font-size: 10px; color: var(--cyan); text-align: center; }
.help-btn, .export-btn { font-size: 11px; padding: 4px 9px; border-radius: 6px; }
.help-btn { border-color: var(--violet); }
.export-btn { border-color: var(--teal); }
.export-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* legend + hover inspector */
.volume-legend { display: flex; flex-direction: column; gap: 5px; }
.legend-row { display: grid; grid-template-columns: 14px 130px 1fr; gap: 8px; align-items: center; font-size: 10.5px; }
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
.legend-label { color: var(--text); font-family: ui-monospace, monospace; }
.legend-note { color: var(--muted); }
.hover-inspector { font-family: ui-monospace, monospace; font-size: 11px; }
.hover-line { padding: 3px 0; color: #c4d2ec; }
.hover-line.selected { color: var(--amber); }
.hover-label { color: var(--muted); }
.sr-summary { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); color: #a9b6d8; line-height: 1.5; }

/* event log selected */
.event-row { cursor: pointer; }
.event-row.selected { box-shadow: 0 0 0 1px var(--cyan) inset; }

/* help overlay */
.help-overlay { position: fixed; inset: 0; background: rgba(4,7,12,0.7); display: flex;
  align-items: center; justify-content: center; z-index: 50; }
.help-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px 24px; max-width: 460px; width: 90%; }
.help-head { display: flex; justify-content: space-between; align-items: center; }
.help-card table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
.help-card td { padding: 4px 6px; border-bottom: 1px solid rgba(30,40,64,0.5); }
.help-card kbd { background: #0a1422; border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px;
  font-family: ui-monospace, monospace; color: var(--cyan); }
.help-note { margin-top: 12px; font-size: 11px; color: var(--muted); line-height: 1.5; }
.col-right { display: flex; flex-direction: column; }

/* diagnostics */
.diag-group { margin-bottom: 14px; }
.diag-group-title { font-size: 10.5px; color: var(--cyan); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.diag-row { display: flex; justify-content: space-between; gap: 10px; padding: 3px 0; font-family: ui-monospace, monospace; font-size: 11.5px; border-bottom: 1px solid rgba(30,40,64,0.5); }
.diag-label { color: var(--muted); }
.diag-val { text-align: right; }
.diag-note { margin-top: 8px; font-size: 10.5px; color: #a9b6d8; line-height: 1.5;
  border-left: 2px solid var(--cyan); padding-left: 8px; }
.diag-warn { margin-top: 8px; font-size: 10.5px; color: #ffd9a0; line-height: 1.5;
  background: rgba(226,59,208,0.10); border-left: 2px solid var(--magenta); padding: 6px 8px; border-radius: 4px; }

/* projection-speed canvas spans the center width */
.proj-card { padding: 8px; }
.wlabel-toggle { font-size: 10.5px; color: var(--muted); margin: 4px 0 8px; }

/* event log */
.event-scroll { max-height: 230px; overflow-y: auto; font-family: ui-monospace, monospace; }
.event-empty { color: var(--muted); font-size: 12px; padding: 8px; }
.event-row { display: grid; grid-template-columns: 18px 130px 60px 1fr; gap: 8px; align-items: baseline;
  padding: 5px 8px; border-left: 3px solid var(--border); margin-bottom: 4px; background: var(--panel-2);
  border-radius: 0 5px 5px 0; font-size: 11px; }
.event-icon { font-size: 13px; }
.event-type { font-weight: bold; font-size: 10px; }
.event-at { color: var(--muted); }
.event-msg { color: #c4d2ec; line-height: 1.4; }

.boot-error { color:#ff6b6b; padding:24px; white-space:pre-wrap; font-family:ui-monospace,monospace; }
.booting { color:#8ea4c6; padding:24px; font-family:ui-monospace,monospace; }
</style>

<script type="text/plain" id="appsrc">
const { useState, useRef, useEffect, useMemo, useCallback } = React;

// ===================== src/core/singular.ts =====================
/**
 * singular.ts — Typed singular-value algebra.
 *
 * Implements the value type recommended by the uploaded critique
 * ("Rigorous Critique and Defense of the Singular-Coefficient Alpha-Axis Model",
 * pp. 12–14): a tagged state machine, NOT a fake number system.
 *
 *     Real(r)
 *     Singular(c, λ, b, reason)
 *     Bottom(reason)
 *
 * The crucial discipline (critique p.1, p.5): there is no honest ring element K
 * with 0·K = 1. So a division-by-zero / boundary event is recorded as a *labelled
 * singular object* produced by an external operator D0(a)=a#, graded by singular
 * order λ. We never coerce a singularity into ∞ or pretend 1/0 is a number.
 *
 * Arithmetic mirrors the "computational form of the graded singular algebra"
 * (critique p.13):   (a σ^λ)(b σ^μ) = ab σ^(λ+μ).
 */

/**
 * Branch label b. '+'/'−' identify which null sheet / causal branch was hit
 * (critique p.12: "attach a branch b∈{+,−}"). The extra labels are richer
 * visualization/escalation tags used by the 3D layer and event export:
 *   loop     — a closed causal loop was attempted
 *   feedback — a feedback/reply event
 *   mixed    — metadata from incompatible branches was combined
 */
type Branch = 'plain' | '+' | '-' | 'loop' | 'feedback' | 'mixed';

/** A value flowing through the simulator. */
type SingularValue =
  | Real
  | Singular
  | Bottom;

interface Real {
  readonly kind: 'Real';
  readonly value: number;
}

interface Singular {
  readonly kind: 'Singular';
  /** coefficient c — the preserved numerator information */
  readonly coeff: number;
  /** singular order λ (0 = regular, 1/2 = sqrt/Lorentz singularity, 1 = simple pole, …) */
  readonly order: number;
  /** branch label */
  readonly branch: Branch;
  /** human-readable reason the singular tag was created */
  readonly reason: string;
}

interface Bottom {
  readonly kind: 'Bottom';
  /** why the computation became structurally indeterminate */
  readonly reason: string;
}

// --- constructors -----------------------------------------------------------

const Real = (value: number): Real => ({ kind: 'Real', value });

const Singular = (
  coeff: number,
  order: number,
  branch: Branch = 'plain',
  reason = '',
): Singular => ({ kind: 'Singular', coeff, order, branch, reason });

const Bottom = (reason: string): Bottom => ({ kind: 'Bottom', reason });

// --- predicates -------------------------------------------------------------

const isReal = (v: SingularValue): v is Real => v.kind === 'Real';
const isSingular = (v: SingularValue): v is Singular => v.kind === 'Singular';
const isBottom = (v: SingularValue): v is Bottom => v.kind === 'Bottom';

// --- branch merge -----------------------------------------------------------

/**
 * merge(b, d): combining metadata. plain is the identity; '+' and '-' are
 * incompatible and produce Bottom (critique p.13: "mixing incompatible branch
 * metadata … becomes Bottom") — signalled by returning null. Other mismatched
 * non-plain labels combine into the 'mixed' tag rather than collapsing.
 */
function mergeBranch(b: Branch, d: Branch): Branch | null {
  if (b === 'plain') return d;
  if (d === 'plain') return b;
  if (b === d) return b;
  // the two causal null sheets are genuinely incompatible
  if ((b === '+' && d === '-') || (b === '-' && d === '+')) return null;
  return 'mixed';
}

// --- arithmetic (graded singular algebra) -----------------------------------

/** Real(a) + Real(b) = Real(a+b); singular orders combine by domination near the
 *  boundary (higher λ wins); incompatible branches ⇒ Bottom. */
function add(x: SingularValue, y: SingularValue): SingularValue {
  if (isBottom(x)) return x;
  if (isBottom(y)) return y;

  if (isReal(x) && isReal(y)) return Real(x.value + y.value);

  // Real + Singular: the singular σ^λ term dominates the regular σ^0 term
  // as we approach the boundary, so the singular tag survives.
  if (isReal(x) && isSingular(y)) return y;
  if (isSingular(x) && isReal(y)) return x;

  // Singular + Singular
  if (isSingular(x) && isSingular(y)) {
    const branch = mergeBranch(x.branch, y.branch);
    if (branch === null) {
      return Bottom(`incompatible branches ${x.branch} + ${y.branch}`);
    }
    if (x.order === y.order) {
      return Singular(x.coeff + y.coeff, x.order, branch, x.reason || y.reason);
    }
    // dominant (more singular) term survives
    const dom = x.order > y.order ? x : y;
    return Singular(dom.coeff, dom.order, branch, dom.reason);
  }
  return Bottom('unhandled add');
}

/** Multiplication: (a σ^λ)(b σ^μ) = ab σ^(λ+μ); branches merge. */
function mul(x: SingularValue, y: SingularValue): SingularValue {
  if (isBottom(x)) return x;
  if (isBottom(y)) return y;

  if (isReal(x) && isReal(y)) return Real(x.value * y.value);

  if (isReal(x) && isSingular(y)) {
    return Singular(x.value * y.coeff, y.order, y.branch, y.reason);
  }
  if (isSingular(x) && isReal(y)) {
    return Singular(x.coeff * y.value, x.order, x.branch, x.reason);
  }
  if (isSingular(x) && isSingular(y)) {
    const branch = mergeBranch(x.branch, y.branch);
    if (branch === null) {
      return Bottom(`incompatible branches ${x.branch} · ${y.branch}`);
    }
    return Singular(x.coeff * y.coeff, x.order + y.order, branch, x.reason || y.reason);
  }
  return Bottom('unhandled mul');
}

/**
 * Division with singular bookkeeping — the heart of the model.
 *
 *   a / 0  with a ≠ 0  ⇒  Singular(a, 1, plain, "a/0")          (simple pole, order 1)
 *   0 / 0              ⇒  Bottom("0/0 indeterminate")
 *   a / b  with b ≠ 0  ⇒  Real(a/b)
 *
 * `eps` is the boundary tolerance for "denominator ≈ 0".
 * This realises D0(a)=a# WITHOUT asserting 0·a# = a (critique pp.2,5).
 */
function divide(a: SingularValue, b: SingularValue, eps = 1e-12): SingularValue {
  if (isBottom(a)) return a;
  if (isBottom(b)) return b;
  if (!isReal(a) || !isReal(b)) {
    // keep the prototype's arithmetic in the Real layer; singular ÷ singular is
    // out of scope and flagged rather than guessed.
    return Bottom('non-Real division operand');
  }
  const denom = b.value;
  if (Math.abs(denom) <= eps) {
    if (Math.abs(a.value) <= eps) return Bottom('0/0 indeterminate');
    return Singular(a.value, 1, 'plain', `${a.value}/0 — division by zero`);
  }
  return Real(a.value / denom);
}

// --- rendering --------------------------------------------------------------

/** Compact human-readable form, e.g. "Real(2.000)", "Singular(5·σ^0.5, +)", "⊥". */
function format(v: SingularValue): string {
  switch (v.kind) {
    case 'Real':
      return `Real(${fmtNum(v.value)})`;
    case 'Singular': {
      const ord = v.order === 0.5 ? '½' : String(v.order);
      const br = v.branch === 'plain' ? '' : `, ${v.branch}`;
      return `Singular(${fmtNum(v.coeff)}·σ^${ord}${br})`;
    }
    case 'Bottom':
      return `⊥ (${v.reason})`;
  }
}

function fmtNum(n: number): string {
  if (!Number.isFinite(n)) return String(n);
  if (Number.isInteger(n)) return n.toString();
  return n.toFixed(3);
}


// ===================== src/core/physics.ts =====================
/**
 * physics.ts — the three model layers, kept strictly separate.
 *
 *  (1) GEOMETRY LAYER  — split-complex plane  z = x + jα,  j² = 1
 *        norm  N(z) = x² − α²            (critique p.7)
 *        inverse fails on the null set  x² − α² = 0  ⇔  α = ±x
 *        This is a zero-divisor *boundary locus*, NOT 1/0.
 *
 *  (2) 5D DIAGNOSTIC LAYER — speculative kinematics for worldlines
 *        ds² = c²dt² − dx² − dy² − dz² + dα²       (two timelike directions!)
 *        u = dα/dt,  Δ₅D = 1 − (v² − u²)/c²,  γ₅D = 1/√Δ₅D   (critique p.9)
 *        Presented as a property of the ALTERED model, not standard SR.
 *
 *  (3) SIGNAL / PARADOX LAYER — see simulation.ts
 *        prototype null rule  0 = c²dt² − dx² + dα²
 *        ⇒ |dt_signal| = √(max(0, dx² − dα²)) / c
 *
 * NON-GOAL: this is a research visualisation, not a claim of verified physics.
 */



// --- domain classification --------------------------------------------------

type Domain = 'REAL_DOMAIN' | 'SINGULAR_BOUNDARY' | 'ALPHA_DOMAIN';

/**
 * classifyDomain(Δ, ε) (critique p.13):
 *   Δ >  ε  ⇒ REAL_DOMAIN
 *  |Δ| ≤ ε  ⇒ SINGULAR_BOUNDARY
 *   Δ < −ε  ⇒ ALPHA_DOMAIN
 */
function classifyDomain(delta: number, eps: number): Domain {
  if (delta > eps) return 'REAL_DOMAIN';
  if (delta < -eps) return 'ALPHA_DOMAIN';
  return 'SINGULAR_BOUNDARY';
}

// =============================================================================
// (1) GEOMETRY LAYER — split-complex numbers
// =============================================================================

interface SplitComplex {
  x: number;
  alpha: number;
}

/** norm N(z) = x² − α²  =  Δ_split */
function splitNorm(z: SplitComplex): number {
  return z.x * z.x - z.alpha * z.alpha;
}

/** conjugate z̄ = x − jα */
function splitConjugate(z: SplitComplex): SplitComplex {
  return { x: z.x, alpha: -z.alpha };
}

/**
 * Split-complex inverse z⁻¹ = z̄ / N(z) — but tagged.
 * On the null set N(z)=0 the inverse genuinely fails: we return a Singular tag
 * (order ½, because it is a zero-divisor square-root-type boundary, and we record
 * which null sheet α=±x was approached) rather than a fake number.
 */
function splitInverse(z: SplitComplex, eps: number): {
  norm: number;
  domain: Domain;
  value: { re: SingularValue; jcoeff: SingularValue };
} {
  const N = splitNorm(z);
  const domain = classifyDomain(N, eps);
  if (domain === 'SINGULAR_BOUNDARY') {
    const branch: Branch = z.alpha >= 0 ? '+' : '-';
    const tag = Singular(1, 0.5, branch, `split null set x²−α²=0 (α=${branch === '+' ? '+x' : '-x'})`);
    return { norm: N, domain, value: { re: tag, jcoeff: tag } };
  }
  // re part = x/N, j part = −α/N  (z̄ / N)
  return {
    norm: N,
    domain,
    value: { re: Real(z.x / N), jcoeff: Real(-z.alpha / N) },
  };
}

/** Which null sheet a point is nearest to: α=+x ('+') or α=−x ('−'). */
function nullSheet(z: SplitComplex): Branch {
  const dPlus = Math.abs(z.alpha - z.x);
  const dMinus = Math.abs(z.alpha + z.x);
  return dPlus <= dMinus ? '+' : '-';
}

// =============================================================================
// (2) 5D DIAGNOSTIC LAYER
// =============================================================================

interface Kinematics {
  /** ordinary 3-speed magnitude v = |dr/dt| */
  v: number;
  /** alpha-velocity u = dα/dt */
  u: number;
  /** light speed */
  c: number;
}

/** Δ₅D = 1 − (v² − u²)/c²  (critique p.12) */
function delta5D(k: Kinematics): number {
  return 1 - (k.v * k.v - k.u * k.u) / (k.c * k.c);
}

/**
 * γ₅D = 1/√Δ₅D, returned as a typed value (critique p.6: γ ∼ Δ^(−1/2), order ½).
 *   Δ >  ε  ⇒ Real(1/√Δ)
 *  |Δ| ≤ ε  ⇒ Singular(coeff, ½) — Lorentz-type boundary
 *   Δ < −ε  ⇒ Singular(…, ½, branch) — γ would be imaginary (deep alpha domain)
 */
function gamma5D(k: Kinematics, eps: number): {
  delta: number;
  domain: Domain;
  gamma: SingularValue;
} {
  const d = delta5D(k);
  const domain = classifyDomain(d, eps);
  if (domain === 'REAL_DOMAIN') {
    return { delta: d, domain, gamma: Real(1 / Math.sqrt(d)) };
  }
  if (domain === 'SINGULAR_BOUNDARY') {
    return {
      delta: d,
      domain,
      gamma: Singular(1, 0.5, 'plain', 'v²−u²=c² → Δ₅D=0, γ diverges (order ½)'),
    };
  }
  // Δ < 0: γ = 1/√(negative) is imaginary — superluminal-in-projection.
  const coeff = 1 / Math.sqrt(Math.abs(d));
  return {
    delta: d,
    domain,
    gamma: Singular(coeff, 0.5, '-', 'Δ₅D<0 → imaginary dilation (alpha domain)'),
  };
}

// =============================================================================
// (3) SIGNAL PROPAGATION LAYER
// =============================================================================

interface SignalSetup {
  /** sender position on x-axis */
  xSender: number;
  /** receiver position on x-axis */
  xReceiver: number;
  /** coordinate time the signal is emitted */
  tSend: number;
  /** alpha-phase the signal travels through */
  alpha: number;
  /** light speed */
  c: number;
  /** causal branch to realise: '+' forward, '-' reverse */
  branch: Branch;
}

interface SignalResult {
  /** spatial separation dx = xReceiver − xSender */
  dx: number;
  /** alpha displacement dα = alpha */
  dAlpha: number;
  /** the split-style invariant for the signal: dx² − dα² */
  underRoot: number;
  /** classification of underRoot */
  domain: Domain;
  /** |dt_signal| as a typed value */
  dtSignal: SingularValue;
  /** arrival coordinate time as a typed value (tSend ± dt) */
  tArrive: SingularValue;
  /** true when a '-' branch lands strictly before tSend → reverse causal event */
  reverse: boolean;
  /** singular order λ describing escalation (0, ½, 1, …) */
  order: number;
}

/**
 * Projected signal travel time from the null condition of the (x,t,α) subspace:
 *
 *     0 = c²dt² − dx² + dα²   ⇒   |dt_signal| = √(max(0, dx² − dα²)) / c
 *
 * Recovers the ordinary case at α=0, shortens travel as α grows, and hits a
 * singular boundary when dx² = dα². Beyond it (dα² > dx²) the projected interval
 * is imaginary and we keep it as a Singular tag rather than discarding it.
 */
function propagateSignal(s: SignalSetup, eps: number): SignalResult {
  const dx = s.xReceiver - s.xSender;
  const dAlpha = s.alpha;
  const underRoot = dx * dx - dAlpha * dAlpha;
  const domain = classifyDomain(underRoot, eps);
  const sign = s.branch === '-' ? -1 : 1;

  let dtSignal: SingularValue;
  let order: number;

  if (domain === 'REAL_DOMAIN') {
    const dt = Math.sqrt(underRoot) / s.c;
    dtSignal = Real(dt);
    order = 0;
  } else if (domain === 'SINGULAR_BOUNDARY') {
    // dx² = dα²: light-cone-like boundary in projection — sqrt singularity.
    dtSignal = Singular(0, 0.5, s.branch, 'dx²=dα²: projected null boundary (order ½)');
    order = 0.5;
  } else {
    // dα² > dx²: imaginary projected interval — deep alpha / paradox domain.
    const mag = Math.sqrt(-underRoot) / s.c;
    dtSignal = Singular(mag, 0.5, s.branch, 'dα²>dx²: imaginary projected interval');
    order = 0.5;
  }

  // arrival time tSend ± dt
  let tArrive: SingularValue;
  let reverse = false;
  if (dtSignal.kind === 'Real') {
    const ta = s.tSend + sign * dtSignal.value;
    tArrive = Real(ta);
    if (sign < 0 && ta < s.tSend - eps) {
      reverse = true;
      order = Math.max(order, 1); // promote: reverse-arrival paradox is order 1
    }
  } else if (dtSignal.kind === 'Singular') {
    // boundary / imaginary interval: arrival itself is singular
    const ta = s.tSend + sign * dtSignal.coeff;
    tArrive = Singular(ta, dtSignal.order, dtSignal.branch, 'singular arrival time');
    if (sign < 0) {
      reverse = true;
      order = Math.max(order, 1);
    }
  } else {
    tArrive = dtSignal; // Bottom
  }

  return { dx, dAlpha, underRoot, domain, dtSignal, tArrive, reverse, order };
}

// =============================================================================
// (4) KIDI LIGHT-SPEED PROJECTION — equivalent projected speed observable
// =============================================================================
//
// Built ENTIRELY from the existing signal law; c stays a constant reference, the
// W axis is a display alias of the existing alpha coordinate.
//
//   deltaSignal = dx^2 - dW^2
//   |dt_signal| = sqrt(deltaSignal) / c           (real domain)
//   v_equiv     = |dx| / |dt_signal| = c|dx| / sqrt(deltaSignal)
//   beta_equiv  = v_equiv / c = |dx| / sqrt(deltaSignal) = 1 / sqrt(rho)
//   eta = |dW| / |dx|,   rho = deltaSignal / dx^2 = 1 - eta^2
//
// "v_equiv" is the equivalent ordinary 3D speed that would reproduce the same
// arrival time WITHOUT the W/alpha path. beta_equiv > 1 is a *projection*
// statement inside the speculative model, NOT a claim of verified physical FTL.

type ProjectionClass =
  | 'LIGHT_SPEED'
  | 'PROJECTED_SUPERLUMINAL'
  | 'KIDI_BOUNDARY'
  | 'W_DOMAIN_NO_REAL_DT'
  | 'UNDEFINED_DX';

interface ProjectionSpeedResult {
  dx: number;
  /** display alias of the alpha displacement */
  dW: number;
  c: number;
  deltaSignal: number; // dx^2 - dW^2
  eta: number; // |dW| / |dx|
  rho: number; // deltaSignal / dx^2
  betaEquiv: SingularValue;
  vEquiv: SingularValue;
  className: ProjectionClass;
  /** true only in LIGHT_SPEED / PROJECTED_SUPERLUMINAL (dt_signal real & nonzero) */
  isRealProjection: boolean;
  /** for the non-real W domain: √|Δ_signal|/c — NOT a real speed */
  imaginaryMagnitude?: number;
  warning?: string;
}

interface ProjectionSpeedArgs {
  dx: number;
  dW: number; // display alias of alpha displacement
  c: number;
  eps?: number;
  branch?: Branch;
}

/**
 * Equivalent projected-speed observable (PATCHED, tolerance-based classification).
 *
 * `Kidi` is the user-facing name for typed singular boundary states; the internal
 * algebra remains Singular / Bottom for code stability. Classification uses
 * tolerances (never exact `dW===0` / `|dW|===|dx|`):
 *
 *   dxAbs <= epsSafe          → UNDEFINED_DX          (checked BEFORE dividing)
 *   eta <= etaMin             → LIGHT_SPEED           (β=1)
 *   etaMin < eta < 1-tol      → PROJECTED_SUPERLUMINAL (β>1, real)
 *   |eta-1| <= tol            → KIDI_BOUNDARY         (Singular, order ½)
 *   eta > 1+tol               → W_DOMAIN_NO_REAL_DT   (typed, NOT a real speed, NOT ∞)
 */
function computeProjectionSpeed(args: ProjectionSpeedArgs): ProjectionSpeedResult {
  const { dx, dW, c } = args;
  const epsSafe = Math.max(args.eps ?? 1e-9, 1e-9);
  const branch = args.branch ?? 'plain';

  const dxAbs = Math.abs(dx);
  const dWAbs = Math.abs(dW);
  const deltaSignal = dx * dx - dW * dW;

  // dx ≈ 0 must be checked BEFORE computing eta (avoid divide-by-zero)
  if (dxAbs <= epsSafe) {
    return {
      dx, dW, c, deltaSignal,
      eta: NaN, rho: NaN,
      betaEquiv: Bottom('dx≈0 makes projected speed undefined'),
      vEquiv: Bottom('dx≈0 makes projected speed undefined'),
      className: 'UNDEFINED_DX',
      isRealProjection: false,
      warning: 'Projected speed is undefined because dx≈0.',
    };
  }

  const eta = dWAbs / dxAbs;
  const rho = deltaSignal / (dxAbs * dxAbs);
  const etaMin = Math.max(1e-6, epsSafe / dxAbs);
  const boundaryTol = Math.max(1e-6, epsSafe / dxAbs);
  const base = { dx, dW, c, deltaSignal, eta, rho };

  if (eta <= etaMin) {
    return { ...base, betaEquiv: Real(1), vEquiv: Real(c), className: 'LIGHT_SPEED', isRealProjection: true };
  }

  if (eta < 1 - boundaryTol) {
    const beta = dxAbs / Math.sqrt(deltaSignal);
    return {
      ...base,
      betaEquiv: Real(beta),
      vEquiv: Real(c * beta),
      className: 'PROJECTED_SUPERLUMINAL',
      isRealProjection: true,
    };
  }

  if (Math.abs(eta - 1) <= boundaryTol) {
    return {
      ...base,
      betaEquiv: Singular(dxAbs, 0.5, branch, 'β_equiv reaches Kidi Boundary: |dW|≈|dx|'),
      vEquiv: Singular(c * dxAbs, 0.5, branch, 'v_equiv reaches Kidi Boundary: |dW|≈|dx|'),
      className: 'KIDI_BOUNDARY',
      isRealProjection: false,
      warning: 'Projected travel time approaches zero at the Kidi Boundary.',
    };
  }

  // eta > 1+tol : no real projected travel time — typed, but NOT a real speed and NOT ∞
  return {
    ...base,
    betaEquiv: Singular(dxAbs, 0.5, branch, 'β_equiv is outside the real projected domain: |dW|>|dx|'),
    vEquiv: Singular(c * dxAbs, 0.5, branch, 'v_equiv is outside the real projected domain: |dW|>|dx|'),
    className: 'W_DOMAIN_NO_REAL_DT',
    isRealProjection: false,
    imaginaryMagnitude: Math.sqrt(Math.abs(deltaSignal)) / c,
    warning: 'No real projected travel time exists for |dW|>|dx|.',
  };
}

interface LightBaselineResult {

  tSend: number;
  dtLight: SingularValue;
  tLightArrival: SingularValue;
  /** β of the baseline — always 1 in the valid (real) case */
  beta: number;
  label: 'LIGHT_SPEED_BASELINE' | 'UNDEFINED_BASELINE';
  warning?: string;
}

function computeLightBaseline(args: {
  xSender: number;
  xReceiver: number;
  tSend: number;
  c: number;
  eps?: number;
}): LightBaselineResult {
  const epsSafe = Math.max(args.eps ?? 1e-9, 1e-9);
  const dx = args.xReceiver - args.xSender;
  const dxAbs = Math.abs(dx);

  if (Math.abs(args.c) <= epsSafe) {
    return {
      dx,
      c: args.c,
      tSend: args.tSend,
      dtLight: Bottom('c≈0 makes light baseline undefined'),
      tLightArrival: Bottom('c≈0 makes light baseline undefined'),
      beta: NaN,
      label: 'UNDEFINED_BASELINE',
      warning: 'Light-speed baseline is undefined because c≈0.',
    };
  }

  const dt = dxAbs / args.c;
  return {
    dx,
    c: args.c,
    tSend: args.tSend,
    dtLight: Real(dt),
    tLightArrival: Real(args.tSend + dt),
    beta: 1,
    label: 'LIGHT_SPEED_BASELINE',
  };
}

// =============================================================================
// (6) REDUCED KIDI CORRIDOR - V-W CORRELATION FIELD (core feasibility proof)
// =============================================================================
//
// Reduced feasibility layer (no 5D / negative time / reverse branch needed):
// can a *local* speed V < c still arrive before the ordinary alpha=0 light
// baseline, because the W/alpha corridor shortens the effective distance?
//
//   D = |dx|,  eta = |W|/D,  beta = V/c
//   D_eff   = sqrt(D^2 - W^2) = D*sqrt(1 - eta^2)
//   t_light = D/c            t_sub-c = D_eff/V = D*sqrt(1-eta^2)/(beta*c)
//   beats light  <=>  t_sub-c < t_light  <=>  beta^2 + eta^2 > 1   (0<beta<1, 0<eta<1)
//
// NOT a claim of verified physical FTL: V stays below c; the earlier arrival is a
// geometric corridor shortening inside the speculative model.

type VWCorrelationClass =
  | 'SUBC_TOO_SLOW'
  | 'EQUAL_TO_LIGHT_BASELINE'
  | 'SUBC_BEATS_LIGHT'
  | 'KIDI_BOUNDARY'
  | 'NO_REAL_CORRIDOR'
  | 'LIGHT_SPEED_LIMIT'
  | 'INVALID_INPUT';

interface VWCorrelationResult {
  dx: number;
  D: number;
  W: number;
  WAbs: number;
  V: number;
  c: number;
  eta: number;
  beta: number;
  fieldScore: number;
  boundaryValue: number;
  margin: number;
  betaThreshold: number;
  etaThreshold: number;
  effectiveDistance: SingularValue;
  dtLight: SingularValue;
  dtSubC: SingularValue;
  tSend: number;
  tLightArrival: SingularValue;
  tSubCArrival: SingularValue;
  gainVsLight: SingularValue;
  className: VWCorrelationClass;
  beatsLight: boolean;
  isSubC: boolean;
  isRealCorridor: boolean;
  message: string;
  warning?: string;
}

function computeVWCorrelationField(args: {
  dx: number;
  W: number;
  V: number;
  c: number;
  tSend?: number;
  eps?: number;
  branch?: Branch;
}): VWCorrelationResult {
  const epsSafe = Math.max(args.eps ?? 1e-9, 1e-9);
  const branch = args.branch ?? 'plain';
  const tSend = args.tSend ?? 0;
  const D = Math.abs(args.dx);
  const WAbs = Math.abs(args.W);
  const { V, c } = args;

  if (D <= epsSafe || c <= epsSafe || V <= epsSafe) {
    const b = Bottom('invalid D, c, or V');
    return {
      dx: args.dx, D, W: args.W, WAbs, V, c,
      eta: NaN, beta: NaN, fieldScore: NaN, boundaryValue: 1, margin: NaN,
      betaThreshold: NaN, etaThreshold: NaN,
      effectiveDistance: b, dtLight: b, dtSubC: b, tSend,
      tLightArrival: b, tSubCArrival: b, gainVsLight: b,
      className: 'INVALID_INPUT', beatsLight: false, isSubC: false, isRealCorridor: false,
      message: 'Invalid input: D, c, and V must be positive.',
      warning: 'Invalid input for V-W correlation field.',
    };
  }

  const eta = WAbs / D;
  const beta = V / c;
  const fieldScore = beta * beta + eta * eta;
  const margin = fieldScore - 1;
  const boundaryTol = Math.max(1e-6, epsSafe / D);
  const marginTol = Math.max(1e-6, epsSafe / D);
  const betaThreshold = eta < 1 ? Math.sqrt(Math.max(0, 1 - eta * eta)) : NaN;
  const etaThreshold = beta < 1 ? Math.sqrt(Math.max(0, 1 - beta * beta)) : NaN;
  const dtLightValue = D / c;
  const tLightArrivalValue = tSend + dtLightValue;
  const fieldBase = {
    dx: args.dx, D, W: args.W, WAbs, V, c, eta, beta, fieldScore, boundaryValue: 1, margin,
    betaThreshold, etaThreshold, tSend,
  };

  if (eta > 1 + boundaryTol) {
    const mag = Math.sqrt(Math.abs(D * D - WAbs * WAbs));
    return {
      ...fieldBase,
      effectiveDistance: Singular(mag, 0.5, branch, 'No real Kidi corridor for |W|>|dx|'),
      dtLight: Real(dtLightValue),
      dtSubC: Singular(mag / V, 0.5, branch, 'No real sub-c corridor time for |W|>|dx|'),
      tLightArrival: Real(tLightArrivalValue),
      tSubCArrival: Singular(tSend, 0.5, branch, 'No real sub-c corridor arrival'),
      gainVsLight: Singular(dtLightValue, 0.5, branch, 'No real gain outside real corridor'),
      className: 'NO_REAL_CORRIDOR', beatsLight: false, isSubC: beta < 1, isRealCorridor: false,
      message: 'No real corridor: |W| exceeds D.',
      warning: 'Do not interpret this as faster-than-light. The projected corridor is non-real.',
    };
  }

  if (Math.abs(eta - 1) <= boundaryTol) {
    return {
      ...fieldBase, betaThreshold: 0,
      effectiveDistance: Singular(0, 0.5, branch, 'Kidi Boundary: effective corridor distance -> 0'),
      dtLight: Real(dtLightValue),
      dtSubC: Singular(0, 0.5, branch, 'Kidi Boundary: sub-c corridor time -> 0'),
      tLightArrival: Real(tLightArrivalValue),
      tSubCArrival: Singular(tSend, 0.5, branch, 'Kidi Boundary arrival is typed, not zero-time travel'),
      gainVsLight: Singular(dtLightValue, 0.5, branch, 'Gain reaches Kidi Boundary'),
      className: 'KIDI_BOUNDARY', beatsLight: false, isSubC: beta < 1, isRealCorridor: false,
      message: 'Kidi Boundary: effective distance tends to zero.',
      warning: 'Do not display as ordinary finite-speed travel.',
    };
  }

  const effectiveDistanceValue = Math.sqrt(D * D - WAbs * WAbs);
  const dtSubCValue = effectiveDistanceValue / V;
  const tSubCArrivalValue = tSend + dtSubCValue;
  const gainValue = dtLightValue - dtSubCValue;
  const realBase = {
    ...fieldBase,
    effectiveDistance: Real(effectiveDistanceValue),
    dtLight: Real(dtLightValue),
    dtSubC: Real(dtSubCValue),
    tLightArrival: Real(tLightArrivalValue),
    tSubCArrival: Real(tSubCArrivalValue),
    gainVsLight: Real(gainValue),
    isRealCorridor: true as const,
  };

  if (beta >= 1 - marginTol) {
    return {
      ...realBase,
      className: 'LIGHT_SPEED_LIMIT', beatsLight: gainValue > epsSafe, isSubC: false,
      message: 'V is at or above c; this module is for sub-c feasibility.',
      warning: 'Use the projection-speed module for non-sub-c cases.',
    };
  }

  if (Math.abs(margin) <= marginTol) {
    return { ...realBase, className: 'EQUAL_TO_LIGHT_BASELINE', beatsLight: false, isSubC: true,
      message: 'Equal to light baseline: beta^2 + eta^2 ~ 1.' };
  }
  if (margin > marginTol) {
    return { ...realBase, className: 'SUBC_BEATS_LIGHT', beatsLight: true, isSubC: true,
      message: 'Sub-c feasible: V<c but W is large enough to beat the light baseline.' };
  }
  return { ...realBase, className: 'SUBC_TOO_SLOW', beatsLight: false, isSubC: true,
    message: 'Too slow: increase W or V to beat the light baseline.' };
}

/** Required |W| window so a sub-c speed v beats light:  D·√(1−β²) < |W| < D. */
function requiredWForSubCSpeed(args: { dx: number; c: number; v: number; eps?: number }): {
  D: number;
  beta: number;
  wMinExclusive: SingularValue;
  wMaxExclusive: SingularValue;
  conditionText: string;
} {
  const epsSafe = Math.max(args.eps ?? 1e-9, 1e-9);
  const D = Math.abs(args.dx);
  const beta = args.c > epsSafe ? args.v / args.c : NaN;
  if (D <= epsSafe || !(args.c > epsSafe) || !(args.v > epsSafe)) {
    const b = Bottom('undefined: dx≈0 or invalid c/v');
    return { D, beta, wMinExclusive: b, wMaxExclusive: b, conditionText: 'undefined' };
  }
  const wMin = D * Math.sqrt(Math.max(0, 1 - beta * beta));
  return {
    D,
    beta,
    wMinExclusive: Real(wMin),
    wMaxExclusive: Real(D),
    conditionText: `${wMin.toFixed(3)} < |W| < ${D.toFixed(3)}`,
  };
}

/** Required local speed window so a given |W| beats light:  c·√(1−η²) < v < c. */
function requiredVForW(args: { dx: number; W: number; c: number; eps?: number }): {
  D: number;
  eta: number;
  vMinExclusive: SingularValue;
  vMaxExclusive: SingularValue;
  conditionText: string;
} {
  const epsSafe = Math.max(args.eps ?? 1e-9, 1e-9);
  const D = Math.abs(args.dx);
  if (D <= epsSafe || !(args.c > epsSafe)) {
    const b = Bottom('undefined: dx≈0 or invalid c');
    return { D, eta: NaN, vMinExclusive: b, vMaxExclusive: b, conditionText: 'undefined' };
  }
  const eta = Math.abs(args.W) / D;
  if (eta >= 1) {
    return {
      D, eta,
      vMinExclusive: Bottom('|W| ≥ |dx|: no real sub-c corridor'),
      vMaxExclusive: Real(args.c),
      conditionText: 'no real corridor (|W| ≥ |dx|)',
    };
  }
  const vMin = args.c * Math.sqrt(Math.max(0, 1 - eta * eta));
  return {
    D,
    eta,
    vMinExclusive: Real(vMin),
    vMaxExclusive: Real(args.c),
    conditionText: `${vMin.toFixed(3)} < v < ${args.c.toFixed(3)}`,
  };
}

const CANONICAL_PHASE_IDS = ['ordinary', 'shortcut', 'paradox'] as const;

// --- events -----------------------------------------------------------------

type EventType =
  | 'PHASE_CHANGE'
  | 'SEND'
  | 'LIGHT_BASELINE'
  | 'BOUNDARY_TOUCH'
  | 'REVERSE_ARRIVAL'
  | 'FEEDBACK_CONTRADICTION'
  | 'RECEIVE'
  | 'EXPORT';

type EventLevel = 'info' | 'warn' | 'singular' | 'bottom';

/** Flat snapshot of the scenario + phase controls at event time (schema shape). */
interface ScenarioSnapshot {
  xBob: number;
  xAlice: number;
  tSend: number;
  c: number;
  eps: number;
  alpha: number;
  branch: Branch;
  closeLoop: boolean;
}

/**
 * A research-grade, exportable event. Shape matches sim-event.schema.json so the
 * exported JSON validates. `typedState` is the event's typed singular value;
 * `arrival` is the (optional) numeric arrival; `payload` carries 3D coordinates.
 */
interface SimEvent {
  id: string;
  seq: number;
  type: EventType;
  level: EventLevel;
  phaseId: string;
  message: string;
  timestamp: number;
  scenario: ScenarioSnapshot;
  typedState: SingularValue;
  arrival?: SingularValue;
  payload?: Record<string, unknown>;
}

function snapshotOf(scn: Scenario, phase: Phase): ScenarioSnapshot {
  return {
    xBob: scn.xBob,
    xAlice: scn.xAlice,
    tSend: scn.tSend,
    c: scn.c,
    eps: scn.eps,
    alpha: phase.alpha,
    branch: phase.branch,
    closeLoop: !!phase.closeLoop,
  };
}

// --- full diagnostic snapshot for one phase ---------------------------------

interface Diagnostics {
  scenario: Scenario;
  phase: Phase;
  signal: SignalResult;
  /** Δ_split = x² − α² evaluated at the receiver position with this phase */
  deltaSplit: number;
  splitDomain: Domain;
  /** 5D diagnostic for the worldline implied by this signalling */
  kinematics: Kinematics;
  delta5D: number;
  gamma5D: SingularValue;
  gamma5DDomain: Domain;
  /** overall escalation order reached */
  order: number;
  /** typed arrival */
  arrival: SingularValue;
  reverse: boolean;
  /** Bottom if a feedback contradiction is detected */
  contradiction: SingularValue | null;
  /** Kidi light-speed projection observable (equivalent projected 3D speed) */
  projection: ProjectionSpeedResult;
  /** ordinary α=0 light-speed reference baseline (a fixed comparison ruler) */
  lightBaseline: LightBaselineResult;
  /** reduced Kidi corridor V–W correlation field (can V<c still beat light?) */
  vwCorrelation: VWCorrelationResult;
}

/**
 * Evaluate one phase end-to-end: signal propagation + split-complex invariant +
 * 5D diagnostic, then decide whether a feedback contradiction (Bottom) arises.
 *
 * Feedback-contradiction rule: a reverse arrival could be used to send a *reply*
 * back to the sender. If that reply (same branch flipped to forward, same dt)
 * would itself land before the original cause, the loop is closed and the state
 * is structurally indeterminate → Bottom (highest escalation).
 */
function evaluatePhase(scn: Scenario, phase: Phase): Diagnostics {
  const setup: SignalSetup = {
    xSender: scn.xBob,
    xReceiver: scn.xAlice,
    tSend: scn.tSend,
    alpha: phase.alpha,
    c: scn.c,
    branch: phase.branch,
  };
  const signal = propagateSignal(setup, scn.eps);

  // split-complex invariant at receiver under this phase
  const deltaSplit = splitNorm({ x: scn.xAlice - scn.xBob, alpha: phase.alpha });
  const splitDomain = classifyDomain(deltaSplit, scn.eps);

  // Kidi light-speed projection observable (equivalent projected 3D speed)
  const projection = computeProjectionSpeed({
    dx: signal.dx,
    dW: signal.dAlpha,
    c: scn.c,
    eps: scn.eps,
    branch: phase.branch,
  });

  // ordinary α=0 light-speed reference baseline (comparison ruler)
  const lightBaseline = computeLightBaseline({
    xSender: scn.xBob,
    xReceiver: scn.xAlice,
    tSend: scn.tSend,
    c: scn.c,
    eps: scn.eps,
  });

  // reduced Kidi corridor V–W correlation field (local V<c vs the α=0 light baseline)
  const betaSub = scn.betaSub ?? 0.8;
  const vwCorrelation = computeVWCorrelationField({
    dx: signal.dx,
    W: signal.dAlpha,
    V: betaSub * scn.c,
    c: scn.c,
    tSend: scn.tSend,
    eps: scn.eps,
    branch: phase.branch,
  });

  // kinematics implied by the signal: it covers dx in |dt| with alpha-rate u.
  const dtMag =
    signal.dtSignal.kind === 'Real'
      ? Math.abs(signal.dtSignal.value)
      : Math.abs(signal.dtSignal.kind === 'Singular' ? signal.dtSignal.coeff : 0);
  const v = dtMag > 0 ? Math.abs(signal.dx) / dtMag : Infinity;
  const u = dtMag > 0 ? Math.abs(signal.dAlpha) / dtMag : Infinity;
  const kinematics: Kinematics = { v, u, c: scn.c };
  const g = gamma5D(kinematics, scn.eps);

  // feedback contradiction detection — only when the phase opts to close the loop
  let contradiction: SingularValue | null = null;
  let order = signal.order;
  if (phase.closeLoop && signal.reverse && signal.tArrive.kind !== 'Bottom') {
    // A reply travels the same dt back; if cause precedes effect both ways, ⊥.
    const arriveT =
      signal.tArrive.kind === 'Real' ? signal.tArrive.value
      : signal.tArrive.coeff;
    const replyArrival = arriveT - dtMag; // reply sent from reverse arrival back to Bob
    if (replyArrival < scn.tSend - scn.eps) {
      // The contradiction is represented by the typed Bottom state, NOT by a
      // synthetic infinite singular order. `order` stays finite (1, reverse).
      contradiction = Bottom(
        `closed causal loop: reply lands t=${replyArrival.toFixed(3)} < cause t=${scn.tSend}`,
      );
    }
  }

  return {
    scenario: scn,
    phase,
    signal,
    deltaSplit,
    splitDomain,
    kinematics,
    delta5D: g.delta,
    gamma5D: g.gamma,
    gamma5DDomain: g.domain,
    order,
    arrival: signal.tArrive,
    reverse: signal.reverse,
    contradiction,
    projection,
    lightBaseline,
    vwCorrelation,
  };
}

/**
 * Build the ordered event list for a phase from its diagnostics.
 * Events carry the full schema shape (id, scenario snapshot, typedState, 3D
 * payload), so the event log can be exported as valid JSON.
 */
function buildEvents(diag: Diagnostics, startSeq: number, now = Date.now() / 1000): SimEvent[] {
  const out: SimEvent[] = [];
  const snap = snapshotOf(diag.scenario, diag.phase);
  const arriveN = arrivalNumber(diag.arrival);
  const send3: Triple = [diag.scenario.xBob, diag.scenario.tSend, 0];
  const arrive3: Triple = [diag.scenario.xAlice, arriveN, diag.phase.alpha];
  let seq = startSeq;

  const push = (
    type: EventType,
    level: EventLevel,
    message: string,
    typedState: SingularValue,
    arrival?: SingularValue,
    payload?: Record<string, unknown>,
  ) => {
    out.push({
      id: `evt-${String(seq).padStart(4, '0')}`,
      seq,
      type,
      level,
      phaseId: diag.phase.id,
      message,
      timestamp: now + seq * 1e-3,
      scenario: snap,
      typedState,
      arrival,
      payload,
    });
    seq++;
  };

  push('PHASE_CHANGE', 'info', `Phase → ${diag.phase.name} (branch ${diag.phase.branch})`, Real(diag.scenario.tSend));
  push(
    'SEND',
    'info',
    `Bob emits at x=${diag.scenario.xBob}, t=${diag.scenario.tSend}, α=${num(diag.phase.alpha)}`,
    Real(diag.scenario.tSend),
    undefined,
    { send: send3 },
  );

  if (diag.lightBaseline.label === 'LIGHT_SPEED_BASELINE') {
    const lbN = diag.lightBaseline.tLightArrival.kind === 'Real' ? diag.lightBaseline.tLightArrival.value : NaN;
    push(
      'LIGHT_BASELINE',
      'info',
      `Light baseline: Bob emits α=0 reference ray, arrival ${arrivalText(diag.lightBaseline.tLightArrival)} (β=1)`,
      diag.lightBaseline.dtLight,
      diag.lightBaseline.tLightArrival,
      { send: send3, arrival: [diag.scenario.xAlice, lbN, 0] },
    );
  }

  if (diag.splitDomain === 'SINGULAR_BOUNDARY' || diag.signal.domain === 'SINGULAR_BOUNDARY') {
    push(
      'BOUNDARY_TOUCH',
      'singular',
      `Singular boundary touched (Δ_split=${num(diag.deltaSplit)}, dx²−dα²=${num(diag.signal.underRoot)}) — order ½ tag created`,
      diag.signal.dtSignal,
      diag.arrival,
      { deltaSplit: diag.deltaSplit, deltaSignal: diag.signal.underRoot, send: send3, arrival: arrive3 },
    );
  }

  if (diag.reverse) {
    push(
      'REVERSE_ARRIVAL',
      'singular',
      `Alice receives before Bob sends: lands ${arrivalText(diag.arrival)} < send ${diag.scenario.tSend}. Preserved as Singular(order 1).`,
      Singular(1, 1, '-', 'reverse arrival'),
      diag.arrival,
      { send: send3, arrival: arrive3, deltaSignal: diag.signal.underRoot },
    );
  }

  if (diag.contradiction) {
    push(
      'FEEDBACK_CONTRADICTION',
      'bottom',
      `Higher-order feedback contradiction → ${format(diag.contradiction)}. Kept as Bottom, NOT discarded.`,
      diag.contradiction,
      diag.arrival,
      { send: send3, arrival: arrive3, branch: 'feedback' },
    );
  } else {
    push(
      'RECEIVE',
      diag.reverse ? 'warn' : 'info',
      `Alice ${diag.reverse ? '(paradoxically) ' : ''}receives at x=${diag.scenario.xAlice}, t=${arrivalText(diag.arrival)}`,
      diag.arrival,
      diag.arrival,
      { send: send3, arrival: arrive3, deltaSignal: diag.signal.underRoot },
    );
  }

  return out;
}

// --- small formatters / helpers ---------------------------------------------

type Triple = [number, number, number];

function arrivalNumber(v: SingularValue): number {
  if (v.kind === 'Real') return v.value;
  if (v.kind === 'Singular') return v.coeff;
  return NaN;
}

function num(n: number): string {
  return Number.isInteger(n) ? n.toString() : n.toFixed(3);
}
function arrivalText(v: SingularValue): string {
  if (v.kind === 'Real') return `t=${num(v.value)}`;
  if (v.kind === 'Singular') return `t≈${num(v.coeff)} (σ^${v.order})`;
  return '⊥';
}

/**
 * schemas.ts — JSON Schemas (Draft 2020-12) for the exported research data, plus
 * a tiny dependency-free validator used by export validation and self-tests.
 *
 * We do NOT pull in a JSON-Schema library (keeps the offline standalone free of
 * extra vendored deps). The validators below check exactly the constraints the
 * schemas declare for our value/event shapes.
 */




// --- the schemas as data (also embedded into exports for provenance) --------

const REAL_VALUE_SCHEMA = {
  $id: 'https://timeparadoxlab.local/schemas/real-value.schema.json',
  $schema: 'https://json-schema.org/draft/2020-12/schema',
  title: 'RealValue',
  type: 'object',
  additionalProperties: false,
  required: ['kind', 'value'],
  properties: { kind: { const: 'Real' }, value: { type: 'number' } },
} as const;

const SINGULAR_VALUE_SCHEMA = {
  $id: 'https://timeparadoxlab.local/schemas/singular-value.schema.json',
  $schema: 'https://json-schema.org/draft/2020-12/schema',
  title: 'SingularValueTagged',
  type: 'object',
  additionalProperties: false,
  required: ['kind', 'coeff', 'order', 'branch', 'reason'],
  properties: {
    kind: { const: 'Singular' },
    coeff: { type: 'number' },
    order: { type: 'number', exclusiveMinimum: 0 },
    branch: { type: 'string', enum: ['plain', '+', '-', 'loop', 'feedback', 'mixed'] },
    reason: { type: 'string', minLength: 1 },
  },
} as const;

const BOTTOM_VALUE_SCHEMA = {
  $id: 'https://timeparadoxlab.local/schemas/bottom-value.schema.json',
  $schema: 'https://json-schema.org/draft/2020-12/schema',
  title: 'BottomValue',
  type: 'object',
  additionalProperties: false,
  required: ['kind', 'reason'],
  properties: { kind: { const: 'Bottom' }, reason: { type: 'string', minLength: 1 } },
} as const;

const TYPED_VALUE_SCHEMA = {
  $id: 'https://timeparadoxlab.local/schemas/typed-value.schema.json',
  $schema: 'https://json-schema.org/draft/2020-12/schema',
  title: 'TypedValue',
  oneOf: [
    { $ref: 'real-value.schema.json' },
    { $ref: 'singular-value.schema.json' },
    { $ref: 'bottom-value.schema.json' },
  ],
} as const;

const SIM_EVENT_SCHEMA = {
  $id: 'https://timeparadoxlab.local/schemas/sim-event.schema.json',
  $schema: 'https://json-schema.org/draft/2020-12/schema',
  title: 'SimEvent',
  type: 'object',
  additionalProperties: false,
  required: ['id', 'seq', 'type', 'level', 'phaseId', 'scenario', 'typedState', 'message', 'timestamp'],
  properties: {
    id: { type: 'string' },
    seq: { type: 'integer', minimum: 0 },
    type: {
      type: 'string',
      enum: ['PHASE_CHANGE', 'SEND', 'LIGHT_BASELINE', 'BOUNDARY_TOUCH', 'REVERSE_ARRIVAL', 'FEEDBACK_CONTRADICTION', 'RECEIVE', 'EXPORT'],
    },
    level: { type: 'string', enum: ['info', 'warn', 'singular', 'bottom'] },
    phaseId: { type: 'string' },
    message: { type: 'string' },
    timestamp: { type: 'number' },
    scenario: {
      type: 'object',
      additionalProperties: false,
      required: ['xBob', 'xAlice', 'tSend', 'c', 'eps', 'alpha', 'branch', 'closeLoop'],
      properties: {
        xBob: { type: 'number' },
        xAlice: { type: 'number' },
        tSend: { type: 'number' },
        c: { type: 'number', exclusiveMinimum: 0 },
        eps: { type: 'number', exclusiveMinimum: 0 },
        alpha: { type: 'number' },
        branch: { type: 'string' },
        closeLoop: { type: 'boolean' },
      },
    },
    typedState: { $ref: 'typed-value.schema.json' },
    arrival: { $ref: 'typed-value.schema.json' },
    payload: { type: 'object' },
  },
} as const;

// --- validators -------------------------------------------------------------

const BRANCHES: Branch[] = ['plain', '+', '-', 'loop', 'feedback', 'mixed'];
const EVENT_TYPES: EventType[] = [
  'PHASE_CHANGE', 'SEND', 'LIGHT_BASELINE', 'BOUNDARY_TOUCH', 'REVERSE_ARRIVAL', 'FEEDBACK_CONTRADICTION', 'RECEIVE', 'EXPORT',
];
const LEVELS: EventLevel[] = ['info', 'warn', 'singular', 'bottom'];

const isNum = (x: unknown): x is number => typeof x === 'number' && Number.isFinite(x);
const isStr = (x: unknown): x is string => typeof x === 'string';

/** Validate a TypedValue (Real | Singular | Bottom). Returns a list of errors. */
function validateTypedValue(v: unknown, path = 'typedState'): string[] {
  const errs: string[] = [];
  if (typeof v !== 'object' || v === null) return [`${path}: not an object`];
  const o = v as Record<string, unknown>;
  switch (o.kind) {
    case 'Real':
      if (!isNum(o.value)) errs.push(`${path}.value: expected number`);
      break;
    case 'Singular':
      if (!isNum(o.coeff)) errs.push(`${path}.coeff: expected number`);
      if (!isNum(o.order) || (o.order as number) <= 0) errs.push(`${path}.order: expected number > 0`);
      if (!isStr(o.branch) || !BRANCHES.includes(o.branch as Branch)) errs.push(`${path}.branch: invalid`);
      if (!isStr(o.reason) || (o.reason as string).length < 1) errs.push(`${path}.reason: expected non-empty string`);
      break;
    case 'Bottom':
      if (!isStr(o.reason) || (o.reason as string).length < 1) errs.push(`${path}.reason: expected non-empty string`);
      break;
    default:
      errs.push(`${path}.kind: must be Real | Singular | Bottom`);
  }
  return errs;
}

/** Validate a SimEvent against sim-event.schema.json. Returns a list of errors. */
function validateSimEvent(e: unknown): string[] {
  const errs: string[] = [];
  if (typeof e !== 'object' || e === null) return ['event: not an object'];
  const o = e as Record<string, unknown>;

  if (!isStr(o.id)) errs.push('id: expected string');
  if (typeof o.seq !== 'number' || !Number.isInteger(o.seq) || (o.seq as number) < 0) errs.push('seq: expected integer ≥ 0');
  if (!isStr(o.type) || !EVENT_TYPES.includes(o.type as EventType)) errs.push('type: invalid enum');
  if (!isStr(o.level) || !LEVELS.includes(o.level as EventLevel)) errs.push('level: invalid enum');
  if (!isStr(o.phaseId)) errs.push('phaseId: expected string');
  if (!isStr(o.message)) errs.push('message: expected string');
  if (!isNum(o.timestamp)) errs.push('timestamp: expected number');

  const s = o.scenario as Record<string, unknown> | undefined;
  if (typeof s !== 'object' || s === null) {
    errs.push('scenario: expected object');
  } else {
    for (const k of ['xBob', 'xAlice', 'tSend', 'alpha'] as const) {
      if (!isNum(s[k])) errs.push(`scenario.${k}: expected number`);
    }
    if (!isNum(s.c) || (s.c as number) <= 0) errs.push('scenario.c: expected number > 0');
    if (!isNum(s.eps) || (s.eps as number) <= 0) errs.push('scenario.eps: expected number > 0');
    if (!isStr(s.branch)) errs.push('scenario.branch: expected string');
    if (typeof s.closeLoop !== 'boolean') errs.push('scenario.closeLoop: expected boolean');
  }

  errs.push(...validateTypedValue(o.typedState, 'typedState'));
  if (o.arrival !== undefined) errs.push(...validateTypedValue(o.arrival, 'arrival'));

  return errs;
}

function isValidSimEvent(e: SimEventLike): boolean {
  return validateSimEvent(e).length === 0;
}

/** structural alias to avoid importing the concrete SimEvent type here */
type SimEventLike = {
  id: string;
  seq: number;
  type: string;
  level: string;
  phaseId: string;
  message: string;
  timestamp: number;
  scenario: Record<string, unknown>;
  typedState: SingularValue;
  arrival?: SingularValue;
  payload?: Record<string, unknown>;
};


// ===================== src/core/export.ts =====================
/**
 * export.ts — Event Log JSON export.
 *
 * `buildExport` is a pure function (testable headlessly); `downloadEventLog`
 * performs the browser download via a Blob + object URL, the standard way to
 * save generated text client-side with no backend.
 */




interface EventLogExport {
  $schema: string;
  generator: string;
  version: string;
  exportedAt: string;
  count: number;
  events: SimEvent[];
}

const EXPORT_VERSION = '1.1.0';

/** Build the export payload (pure — used by tests and the download path). */
function buildExport(events: SimEvent[], now: Date = new Date()): EventLogExport {
  return {
    $schema: SIM_EVENT_SCHEMA.$id,
    generator: 'TimeParadoxLab',
    version: EXPORT_VERSION,
    exportedAt: now.toISOString(),
    count: events.length,
    events,
  };
}

/** Validate every event in an export. Returns { valid, errors }. */
function validateExport(data: EventLogExport): { valid: boolean; errors: string[] } {
  const errors: string[] = [];
  data.events.forEach((e, i) => {
    for (const err of validateSimEvent(e)) errors.push(`events[${i}].${err}`);
  });
  return { valid: errors.length === 0, errors };
}

function serializeExport(events: SimEvent[]): string {
  return JSON.stringify(buildExport(events), null, 2);
}

/**
 * Trigger a client-side download of the event log as JSON. Returns the filename.
 * Guards against non-browser environments so it can be imported anywhere.
 */
function downloadEventLog(events: SimEvent[], filename?: string): string {
  const name = filename ?? `timeparadoxlab-events-${Date.now()}.json`;
  const text = serializeExport(events);
  if (typeof document === 'undefined' || typeof URL === 'undefined' || typeof Blob === 'undefined') {
    return name; // headless: nothing to download, but serialization already succeeded
  }
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = name;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  return name;
}


// ===================== src/core/geometry3d.ts =====================
/**
 * geometry3d.ts — pure geometry builders for the (x, t, α) volume.
 *
 * Every builder returns a plain typed descriptor (no Three.js types here) so the
 * geometry can be unit-tested headlessly and re-used by any renderer. Builders
 * never emit NaN vertices (asserted by the self-tests).
 *
 * Scene convention (right-handed):  X = x (space),  Y = t (time),  Z = α (alpha).
 */



type Vec3 = [number, number, number];

interface LineGeometry {
  id: string;
  kind: 'line';
  points: Vec3[];
}

interface MeshGeometry {
  id: string;
  kind: 'mesh';
  /** flat XYZ triples */
  positions: number[];
  /** triangle indices */
  indices: number[];
}

interface PointGeometry {
  id: string;
  kind: 'point';
  position: Vec3;
  label?: string;
}

interface Bounds {
  xMin: number;
  xMax: number;
  tMin: number;
  tMax: number;
  alphaMin: number;
  alphaMax: number;
}

interface SceneGeometry {
  bounds: Bounds;
  worldlines: LineGeometry[];
  loci: MeshGeometry[];
  nullSurface: MeshGeometry[];
  signal: LineGeometry;
  markers: PointGeometry[];
}

// --- helpers ----------------------------------------------------------------

function linspace(a: number, b: number, n: number): number[] {
  if (n <= 1) return [a];
  const out = new Array<number>(n);
  const step = (b - a) / (n - 1);
  for (let i = 0; i < n; i++) out[i] = a + i * step;
  return out;
}

function isFiniteVec(v: Vec3): boolean {
  return Number.isFinite(v[0]) && Number.isFinite(v[1]) && Number.isFinite(v[2]);
}

/** any NaN/∞ in a flat positions array? */
function hasNonFinite(positions: number[]): boolean {
  for (let i = 0; i < positions.length; i++) if (!Number.isFinite(positions[i])) return true;
  return false;
}

// --- worldlines -------------------------------------------------------------

function buildWorldline(id: string, x: number, tMin: number, tMax: number): LineGeometry {
  return { id, kind: 'line', points: [[x, tMin, 0], [x, tMax, 0]] };
}

// --- singular loci planes  α = ±x  (ruled along t) --------------------------

/**
 * Plane α = sign·x extruded across [tMin,tMax] as a quad (two triangles).
 * sign = +1 → Π₊ (α=x);  sign = −1 → Π₋ (α=−x).
 */
function buildSingularPlane(
  id: string,
  sign: 1 | -1,
  xMin: number,
  xMax: number,
  tMin: number,
  tMax: number,
): MeshGeometry {
  const corners: Vec3[] = [
    [xMin, tMin, sign * xMin],
    [xMax, tMin, sign * xMax],
    [xMax, tMax, sign * xMax],
    [xMin, tMax, sign * xMin],
  ];
  const positions = corners.flat();
  const indices = [0, 1, 2, 0, 2, 3];
  return { id, kind: 'mesh', positions, indices };
}

// --- null surface from a send event -----------------------------------------

/**
 * The signal null condition  (x−xS)² − (α−αS)² = (cτ)²,  τ = t − tS.
 * For each (τ, α): rad = (cτ)² + (α−αS)² ≥ 0, so x = xS ± √rad is always real
 * (no NaN). Builds one triangulated sheet per ± branch.
 */
function buildNullSurface(
  send: Vec3,
  c: number,
  tauMax: number,
  alphaMax: number,
  nT = 24,
  nA = 24,
): MeshGeometry[] {
  const [xS, tS, alphaS] = send;
  const taus = linspace(-tauMax, tauMax, nT);
  const alphas = linspace(alphaS - alphaMax, alphaS + alphaMax, nA);

  const buildSheet = (id: string, branch: 1 | -1): MeshGeometry => {
    const positions: number[] = [];
    for (let i = 0; i < nT; i++) {
      for (let k = 0; k < nA; k++) {
        const tau = taus[i];
        const a = alphas[k];
        const rad = (c * tau) ** 2 + (a - alphaS) ** 2;
        const x = xS + branch * Math.sqrt(rad);
        positions.push(x, tS + tau, a);
      }
    }
    const indices: number[] = [];
    for (let i = 0; i < nT - 1; i++) {
      for (let k = 0; k < nA - 1; k++) {
        const v00 = i * nA + k;
        const v01 = i * nA + (k + 1);
        const v10 = (i + 1) * nA + k;
        const v11 = (i + 1) * nA + (k + 1);
        indices.push(v00, v10, v11, v00, v11, v01);
      }
    }
    return { id, kind: 'mesh', positions, indices };
  };

  return [buildSheet('null-plus', 1), buildSheet('null-minus', -1)];
}

// --- signal path ------------------------------------------------------------

/**
 * Didactic signal segment from the send point to the interpreted arrival point.
 * NOT a claim of a physical geodesic — a visualization aid only. If the arrival
 * is non-finite (e.g. Bottom), the segment degenerates to a point (no NaN).
 */
function buildSignalPath(send: Vec3, arrive: Vec3): LineGeometry {
  const end = isFiniteVec(arrive) ? arrive : send;
  return { id: 'signal', kind: 'line', points: [send, end] };
}

// --- assemble the whole scene from diagnostics ------------------------------

function computeBounds(diag: Diagnostics, pad = 1.5): Bounds {
  const { xBob, xAlice, tSend } = diag.scenario;
  const alpha = diag.phase.alpha;
  const xMin = Math.min(xBob, xAlice) - pad;
  const xMax = Math.max(xBob, xAlice) + pad;
  const span = Math.max(Math.abs(xMax), Math.abs(xMin), Math.abs(alpha) + pad, 6);
  return {
    xMin: -span,
    xMax: span,
    tMin: Math.min(-1, tSend - 4),
    tMax: Math.max(tSend + 6, 9),
    alphaMin: -span,
    alphaMax: span,
  };
}

function buildSceneGeometry(diag: Diagnostics): SceneGeometry {
  const b = computeBounds(diag);
  const { xBob, xAlice, tSend, c } = diag.scenario;
  const alpha = diag.phase.alpha;
  const arriveT = arrivalNumber(diag.arrival);

  const send: Vec3 = [xBob, tSend, 0];
  const arrive: Vec3 = [xAlice, arriveT, alpha];

  const tauMax = Math.max(b.tMax - tSend, tSend - b.tMin, 6);
  const alphaMax = b.alphaMax;

  return {
    bounds: b,
    worldlines: [
      buildWorldline('bob', xBob, b.tMin, b.tMax),
      buildWorldline('alice', xAlice, b.tMin, b.tMax),
    ],
    loci: [
      buildSingularPlane('locus-plus', 1, b.xMin, b.xMax, b.tMin, b.tMax),
      buildSingularPlane('locus-minus', -1, b.xMin, b.xMax, b.tMin, b.tMax),
    ],
    nullSurface: buildNullSurface(send, c, tauMax, alphaMax),
    signal: buildSignalPath(send, arrive),
    markers: [
      { id: 'send', kind: 'point', position: send, label: 'SEND' },
      { id: 'arrive', kind: 'point', position: isFiniteVec(arrive) ? arrive : send, label: 'RECEIVE' },
    ],
  };
}


// ===================== src/core/camera.ts =====================
/**
 * camera.ts — spherical orbit-camera helpers for the 3D volume (pure math).
 *
 *   C = T + r · [ cosφ·cosθ , sinφ , cosφ·sinθ ]
 *
 * where T is the target, r the orbit radius, θ azimuth, φ elevation. The
 * Volume3DView wires pointer drag → (θ, φ), wheel → r, and re-derives C here.
 */



type CameraPreset = 'iso' | 'front' | 'top' | 'side' | 'follow';

interface SphericalCamera {
  target: Vec3;
  radius: number;
  azimuth: number; // θ
  elevation: number; // φ
}

const HALF_PI = Math.PI / 2;
const EL_LIMIT = HALF_PI - 0.001; // avoid gimbal lock at the poles

function clampElevation(phi: number): number {
  return Math.max(-EL_LIMIT, Math.min(EL_LIMIT, phi));
}

/** World-space camera position for a spherical camera. */
function cameraPosition(cam: SphericalCamera): Vec3 {
  const { target, radius: r, azimuth: th, elevation: ph } = cam;
  return [
    target[0] + r * Math.cos(ph) * Math.cos(th),
    target[1] + r * Math.sin(ph),
    target[2] + r * Math.cos(ph) * Math.sin(th),
  ];
}

interface PresetAngles {
  azimuth: number;
  elevation: number;
}

const PRESET_ANGLES: Record<CameraPreset, PresetAngles> = {
  iso: { azimuth: Math.PI * 0.25, elevation: Math.PI * 0.18 },
  front: { azimuth: HALF_PI, elevation: 0 }, // look along α at the (x,t) wall
  top: { azimuth: HALF_PI, elevation: EL_LIMIT }, // look down t at the (x,α) plane
  side: { azimuth: 0, elevation: 0 }, // look along x at the (t,α) wall
  follow: { azimuth: Math.PI * 0.28, elevation: Math.PI * 0.14 },
};

/** Build a spherical camera for a named preset. */
function presetCamera(preset: CameraPreset, target: Vec3, radius: number): SphericalCamera {
  const a = PRESET_ANGLES[preset] ?? PRESET_ANGLES.iso;
  return {
    target,
    radius,
    azimuth: a.azimuth,
    elevation: clampElevation(a.elevation),
  };
}

/** A camera is valid if all numbers are finite, radius > 0, elevation in range. */
function isValidCamera(cam: SphericalCamera): boolean {
  const finite =
    cam.target.every(Number.isFinite) &&
    Number.isFinite(cam.radius) &&
    Number.isFinite(cam.azimuth) &&
    Number.isFinite(cam.elevation);
  return finite && cam.radius > 0 && Math.abs(cam.elevation) <= HALF_PI;
}

const ALL_PRESETS: CameraPreset[] = ['iso', 'front', 'top', 'side', 'follow'];


// ===================== src/core/projection.ts =====================
/**
 * projection.ts — manual perspective-projection fallback for non-Three tooling
 * (and a parity reference for tests). Three.js performs the real projection in
 * the live view; this module mirrors it with an explicit look-at camera.
 */



const sub = (a: Vec3, b: Vec3): Vec3 => [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
const dot = (a: Vec3, b: Vec3): number => a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
const cross = (a: Vec3, b: Vec3): Vec3 => [
  a[1] * b[2] - a[2] * b[1],
  a[2] * b[0] - a[0] * b[2],
  a[0] * b[1] - a[1] * b[0],
];
function normalize(a: Vec3): Vec3 {
  const len = Math.hypot(a[0], a[1], a[2]) || 1;
  return [a[0] / len, a[1] / len, a[2] / len];
}

// rotation helpers (per the WO's stated convention)
function rotateY(p: Vec3, a: number): Vec3 {
  const c = Math.cos(a), s = Math.sin(a);
  return [c * p[0] + s * p[2], p[1], -s * p[0] + c * p[2]];
}
function rotateX(p: Vec3, a: number): Vec3 {
  const c = Math.cos(a), s = Math.sin(a);
  return [p[0], c * p[1] - s * p[2], s * p[1] + c * p[2]];
}

interface Projected {
  x: number; // NDC x  [-1, 1] within frustum
  y: number; // NDC y
  depth: number; // view-space depth (>0 in front)
  visible: boolean;
}

/**
 * Perspective project a world point with an explicit look-at camera.
 * fov is the vertical field of view in radians; aspect = width/height.
 */
function projectPoint(
  p: Vec3,
  eye: Vec3,
  target: Vec3,
  up: Vec3,
  fov: number,
  aspect: number,
): Projected {
  const forward = normalize(sub(target, eye));
  const right = normalize(cross(forward, up));
  const trueUp = cross(right, forward);

  const rel = sub(p, eye);
  const cx = dot(rel, right);
  const cy = dot(rel, trueUp);
  const cz = dot(rel, forward); // depth along view axis

  if (cz <= 1e-6) return { x: 0, y: 0, depth: cz, visible: false };

  const f = 1 / Math.tan(fov / 2);
  const x = (f / aspect) * (cx / cz);
  const y = f * (cy / cz);
  return { x, y, depth: cz, visible: Math.abs(x) <= 1 && Math.abs(y) <= 1 };
}


// ===================== src/core/colorRules.ts =====================
/**
 * colorRules.ts — shared appearance mapping for typed values, used by both the
 * 2D canvases and the 3D volume so the visual language is consistent.
 *
 *   strokeWidth = w0 + kw·λ
 *   opacity     = clamp(o0 + ko·λ, 0.25, 1.0)
 *   glowRadius  = g0 + kg·λ
 *
 * No information is encoded by colour alone — every Appearance also carries a
 * text `label`, satisfying the accessibility requirement.
 */



interface Appearance {
  color: string;
  opacity: number;
  thickness: number;
  glow: number;
  pulse: boolean;
  dashed: boolean;
  /** human-readable state label (never rely on colour alone) */
  label: string;
}

// tuning constants for the formulas above
const W0 = 2,
  KW = 1;
const O0 = 0.55,
  KO = 0.18;
const G0 = 0,
  KG = 1.5;

const clamp = (x: number, lo: number, hi: number) => Math.max(lo, Math.min(hi, x));

/** order λ used for sizing (Real→0, Singular→order, Bottom→2). */
function orderOf(v: SingularValue): number {
  if (v.kind === 'Real') return 0;
  if (v.kind === 'Singular') return v.order;
  return 2;
}

/** Base colour family by state (cyan→amber→orange→magenta→red). */
function baseColor(v: SingularValue): string {
  if (v.kind === 'Real') return '#3fd0ff'; // cyan/teal
  if (v.kind === 'Bottom') return '#ff3b3b'; // saturated red
  // Singular by order
  if (v.order <= 0.5) return '#ffd23b'; // amber
  if (v.order <= 1) return '#ff7a3b'; // orange
  return '#e23bd0'; // red → magenta for λ>1
}

/** Branch hue accent (forward greenish, reverse reddish, loop/feedback violet). */
function branchAccent(branch: Branch): string {
  switch (branch) {
    case '+':
      return '#56e39f';
    case '-':
      return '#ff7a3b';
    case 'loop':
    case 'feedback':
    case 'mixed':
      return '#b06bff';
    default:
      return '#9fb6d6';
  }
}

function stateLabel(v: SingularValue): string {
  if (v.kind === 'Real') return 'Real';
  if (v.kind === 'Bottom') return 'Bottom (⊥)';
  const ord = v.order === 0.5 ? '½' : String(v.order);
  return `Singular λ=${ord} (${v.branch})`;
}

/** Full appearance for a typed value, optionally biased by an explicit branch. */
function appearanceForValue(v: SingularValue, branch: Branch = 'plain'): Appearance {
  const lambda = orderOf(v);
  const isReverse = branch === '-' || (v.kind === 'Singular' && v.branch === '-');
  return {
    color: baseColor(v),
    opacity: clamp(O0 + KO * lambda, 0.25, 1.0),
    thickness: W0 + KW * lambda,
    glow: G0 + KG * lambda,
    pulse: v.kind === 'Singular' && Math.abs(v.order - 0.5) < 1e-9,
    dashed: isReverse,
    label: stateLabel(v),
  };
}

// consistent domain colours reused across panels
const DOMAIN_COLORS = {
  REAL_DOMAIN: '#56e39f',
  SINGULAR_BOUNDARY: '#ffd23b',
  ALPHA_DOMAIN: '#e23bd0',
} as const;


// ===================== src/core/useElementSize.ts =====================
/**
 * useElementSize — measure a container with ResizeObserver so canvases/3D views
 * can size to the available width (wide-layout patch). Falls back gracefully if
 * ResizeObserver is unavailable.
 */


function useElementSize<T extends HTMLElement>() {
  const ref = useRef<T | null>(null);
  const [size, setSize] = useState({ width: 600, height: 420 });

  useEffect(() => {
    const el = ref.current;
    if (!el || typeof ResizeObserver === 'undefined') return;

    const observer = new ResizeObserver((entries) => {
      const entry = entries[0];
      if (!entry) return;
      const rect = entry.contentRect;
      setSize({
        width: Math.max(320, Math.floor(rect.width)),
        height: Math.max(280, Math.floor(rect.height)),
      });
    });

    observer.observe(el);
    return () => observer.disconnect();
  }, []);

  return { ref, size };
}
