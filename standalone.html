// ===================== src/components/SpacetimeCanvas.tsx =====================
/**
 * SpacetimeCanvas — main viewport. x (horizontal) vs t (vertical).
 * Draws Bob/Alice worldlines, the light cone from the send event, the signal
 * path (forward or reverse), and an animated marker. Reverse arrivals are
 * flagged in red; a Bottom contradiction shows ⊥.
 *
 * Uses a canvas ref + useEffect for synchronization with drawing (WO rendering
 * requirements). Re-draws whenever diagnostics or animation progress change.
 */



interface Props {
  diag: Diagnostics;
  /** animation progress 0..1 */
  progress: number;
  width: number;
  height: number;
  /** optional cross-panel highlight at world point [x, t, alpha] */
  highlight?: [number, number, number] | null;
  /** show the ordinary α=0 light-speed reference baseline (default true) */
  showLightBaseline?: boolean;
  /** show the gold sub-c corridor arrival path when feasible (default true) */
  showSubCPath?: boolean;
}

function SpacetimeCanvas({ diag, progress, width, height, highlight, showLightBaseline = true, showSubCPath = true }: Props) {
  const ref = useRef<HTMLCanvasElement>(null);

  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;

    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const { scenario, signal, arrival, reverse, contradiction } = diag;

    // world ranges
    const xMin = Math.min(scenario.xBob, scenario.xAlice) - 1.5;
    const xMax = Math.max(scenario.xBob, scenario.xAlice) + 1.5;
    const tMin = -1;
    const tMax = Math.max(scenario.tSend + 6, 9);

    const pad = 42;
    const W = width - pad * 1.4;
    const H = height - pad * 1.4;
    const X = (x: number) => pad + ((x - xMin) / (xMax - xMin)) * W;
    // t increases upward
    const Y = (t: number) => pad * 0.4 + H - ((t - tMin) / (tMax - tMin)) * H;

    // background
    ctx.fillStyle = '#0a0e16';
    ctx.fillRect(0, 0, width, height);

    // grid
    ctx.strokeStyle = 'rgba(120,140,170,0.10)';
    ctx.lineWidth = 1;
    ctx.font = '10px ui-monospace, monospace';
    ctx.fillStyle = 'rgba(150,170,200,0.55)';
    for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
      ctx.beginPath();
      ctx.moveTo(X(x), Y(tMin));
      ctx.lineTo(X(x), Y(tMax));
      ctx.stroke();
      ctx.fillText(`x=${x}`, X(x) + 2, Y(tMin) - 4);
    }
    for (let t = Math.ceil(tMin); t <= Math.floor(tMax); t++) {
      ctx.beginPath();
      ctx.moveTo(X(xMin), Y(t));
      ctx.lineTo(X(xMax), Y(t));
      ctx.stroke();
      ctx.fillText(`t=${t}`, X(xMin) + 2, Y(t) - 2);
    }

    // light cone from send event (forward + past), t = tSend ± (x - xBob)/c
    const sx = scenario.xBob;
    const st = scenario.tSend;
    ctx.fillStyle = 'rgba(80,160,255,0.06)';
    ctx.beginPath();
    ctx.moveTo(X(sx), Y(st));
    ctx.lineTo(X(xMax), Y(st + (xMax - sx) / scenario.c));
    ctx.lineTo(X(xMin), Y(st + (sx - xMin) / scenario.c));
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,160,255,0.35)';
    ctx.setLineDash([4, 4]);
    [-1, 1].forEach((s) => {
      ctx.beginPath();
      ctx.moveTo(X(sx), Y(st));
      ctx.lineTo(X(xMax), Y(st + (s * (xMax - sx)) / scenario.c));
      ctx.moveTo(X(sx), Y(st));
      ctx.lineTo(X(xMin), Y(st + (s * (xMin - sx)) / scenario.c));
      ctx.stroke();
    });
    ctx.setLineDash([]);

    // worldlines
    const drawWorldline = (x: number, color: string, label: string) => {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(X(x), Y(tMin));
      ctx.lineTo(X(x), Y(tMax));
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.font = '12px ui-monospace, monospace';
      ctx.fillText(label, X(x) - 12, Y(tMax) - 6);
    };
    drawWorldline(scenario.xBob, '#3fd0ff', 'Bob');
    drawWorldline(scenario.xAlice, '#ff61dc', 'Alice');

    // arrival time (numeric) for drawing
    const arriveT =
      arrival.kind === 'Real' ? arrival.value
      : arrival.kind === 'Singular' ? arrival.coeff
      : st;

    // --- Light-Speed Reference Baseline: ordinary α=0 ray (a fixed comparison ruler) ---
    const lb = diag.lightBaseline;
    const lbArrive = lb.tLightArrival.kind === 'Real' ? lb.tLightArrival.value : null;
    if (showLightBaseline && lbArrive !== null) {
      ctx.strokeStyle = 'rgba(63,208,255,0.85)';
      ctx.lineWidth = 1.6;
      ctx.setLineDash([7, 5]);
      ctx.beginPath();
      ctx.moveTo(X(scenario.xBob), Y(st));
      ctx.lineTo(X(scenario.xAlice), Y(lbArrive));
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(120,210,255,0.95)';
      ctx.font = '10px ui-monospace, monospace';
      ctx.fillText('Light baseline α=0, β=1', X(scenario.xAlice) - 4, Y(lbArrive) - 6);
    }

    // Sub-c corridor arrival path (gold) — local V<c that still beats light
    const sc = diag.vwCorrelation;
    if (showSubCPath && sc.className === 'SUBC_BEATS_LIGHT' && sc.tSubCArrival.kind === 'Real') {
      ctx.strokeStyle = 'rgba(255,205,60,0.95)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(X(scenario.xBob), Y(st));
      ctx.lineTo(X(scenario.xAlice), Y(sc.tSubCArrival.value));
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,220,120,0.95)';
      ctx.font = '10px ui-monospace, monospace';
      ctx.fillText(`sub-c corridor (v=${sc.beta.toFixed(2)}c)`, X(scenario.xAlice) - 4, Y(sc.tSubCArrival.value) + 14);
    }

    // signal path — coloured by projection class / escalation state
    const proj = diag.projection.className;
    const noReal = arrival.kind !== 'Real'; // W-domain / kidi: no honest real arrival
    const pathColor = contradiction
      ? '#ff3b3b'
      : reverse
      ? '#ff7a3b'
      : signal.domain === 'SINGULAR_BOUNDARY'
      ? '#ffd23b'
      : proj === 'PROJECTED_SUPERLUMINAL'
      ? '#b06bff'
      : '#56e39f';
    ctx.strokeStyle = pathColor;
    ctx.lineWidth = 2.5;
    if (noReal && !reverse) {
      // W_DOMAIN_NO_REAL_DT / boundary: do not imply a real arrival — dashed + blocked
      ctx.setLineDash([4, 4]);
    }
    ctx.beginPath();
    ctx.moveTo(X(scenario.xBob), Y(st));
    ctx.lineTo(X(scenario.xAlice), Y(arriveT));
    ctx.stroke();
    ctx.setLineDash([]);

    // send event
    const dot = (x: number, t: number, color: string, r = 5) => {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(X(x), Y(t), r, 0, Math.PI * 2);
      ctx.fill();
    };
    dot(scenario.xBob, st, '#3fd0ff', 5);
    ctx.fillStyle = '#cfe';
    ctx.font = '11px ui-monospace, monospace';
    ctx.fillText('SEND', X(scenario.xBob) + 8, Y(st) + 4);

    // animated marker along path
    const mp = Math.max(0, Math.min(1, progress));
    const mx = scenario.xBob + mp * (scenario.xAlice - scenario.xBob);
    const mt = st + mp * (arriveT - st);
    dot(mx, mt, '#ffffff', 4);

    // arrival event
    dot(scenario.xAlice, arriveT, pathColor, 6);
    if (contradiction) {
      ctx.fillStyle = '#ff3b3b';
      ctx.font = 'bold 14px ui-monospace, monospace';
      ctx.fillText('⊥ CONTRADICTION', X(scenario.xAlice) - 30, Y(arriveT) - 10);
    } else if (reverse) {
      ctx.strokeStyle = '#ff3b3b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(X(scenario.xAlice), Y(arriveT), 11, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#ff7a3b';
      ctx.font = 'bold 12px ui-monospace, monospace';
      ctx.fillText('REVERSE ↓', X(scenario.xAlice) + 10, Y(arriveT) + 4);
    } else if (noReal) {
      ctx.strokeStyle = '#e23bd0';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(X(scenario.xAlice), Y(arriveT), 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#e6a3df';
      ctx.font = '11px ui-monospace, monospace';
      ctx.fillText('no real dt', X(scenario.xAlice) + 10, Y(arriveT) + 4);
    } else {
      ctx.fillStyle = '#cfe';
      ctx.font = '11px ui-monospace, monospace';
      ctx.fillText('RECEIVE', X(scenario.xAlice) + 10, Y(arriveT) + 4);
    }

    // cross-panel highlight ring
    if (highlight && Number.isFinite(highlight[0]) && Number.isFinite(highlight[1])) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(X(highlight[0]), Y(highlight[1]), 13, 0, Math.PI * 2);
      ctx.stroke();
    }

    // title + gain-vs-light readout
    ctx.fillStyle = 'rgba(180,200,230,0.85)';
    ctx.font = '12px ui-monospace, monospace';
    ctx.fillText('Spacetime (x, t)  —  light cone dashed', pad, 16);
    if (lbArrive !== null) {
      let gainText: string;
      if (arrival.kind === 'Real') {
        const gain = lbArrive - arrival.value;
        gainText =
          Math.abs(gain) < 1e-9 ? 'matches light baseline'
          : gain > 0 ? `arrives ${gain.toFixed(3)} before light baseline`
          : `arrives ${Math.abs(gain).toFixed(3)} after light baseline`;
      } else {
        gainText = 'current arrival is typed kidi/non-real';
      }
      ctx.fillStyle = 'rgba(120,210,255,0.9)';
      ctx.font = '10px ui-monospace, monospace';
      const lbStr = Number.isInteger(lbArrive) ? String(lbArrive) : lbArrive.toFixed(3);
      ctx.fillText(`vs light (t=${lbStr}): ${gainText}`, pad, 29);
    }
  }, [diag, progress, width, height, highlight, showLightBaseline, showSubCPath]);

  return <canvas ref={ref} style={{ width, height, borderRadius: 8 }} />;
}


// ===================== src/components/AlphaPlaneCanvas.tsx =====================
/**
 * AlphaPlaneCanvas — auxiliary viewport for the split-complex geometry.
 * Axes: x (horizontal, cyan) vs α (vertical, violet). Draws the two null lines
 * α = ±x (red), shades the wedge x²−α²>0 (teal, REAL) and x²−α²<0 (magenta,
 * ALPHA), and plots the signal trajectory (0,0)→(Δx, α) with an animated marker.
 *
 * Colour encoding follows the critique (p.13): hue ↔ sign(Δ_split), the marker
 * pulses on the SINGULAR_BOUNDARY.
 */



interface Props {
  diag: Diagnostics;
  progress: number;
  /** wall-clock phase for the pulse animation */
  pulse: number;
  width: number;
  height: number;
  /** optional cross-panel highlight at world point [x, t, alpha] */
  highlight?: [number, number, number] | null;
}

function AlphaPlaneCanvas({ diag, progress, pulse, width, height, highlight }: Props) {
  const ref = useRef<HTMLCanvasElement>(null);

  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;

    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const dx = diag.signal.dx;
    const aMax = Math.max(8, Math.abs(diag.phase.alpha) + 2, Math.abs(dx) + 2);
    const xMin = -1.5;
    const xMax = Math.max(dx + 2, aMax);
    const aMin = -aMax;
    const aHi = aMax;

    const pad = 38;
    const W = width - pad * 1.4;
    const H = height - pad * 1.4;
    const X = (x: number) => pad + ((x - xMin) / (xMax - xMin)) * W;
    const A = (a: number) => pad * 0.4 + H - ((a - aMin) / (aHi - aMin)) * H;

    // background
    ctx.fillStyle = '#0a0e16';
    ctx.fillRect(0, 0, width, height);

    // shade regions by sampling sign(x²−α²) — coarse grid of translucent cells
    const cells = 60;
    const cw = W / cells;
    const ch = H / cells;
    for (let i = 0; i < cells; i++) {
      for (let k = 0; k < cells; k++) {
        const x = xMin + ((i + 0.5) / cells) * (xMax - xMin);
        const a = aMin + ((k + 0.5) / cells) * (aHi - aMin);
        const d = x * x - a * a;
        if (Math.abs(d) < 0.25) continue; // leave boundary clear
        ctx.fillStyle = d > 0 ? 'rgba(40,180,150,0.10)' : 'rgba(200,60,170,0.10)';
        ctx.fillRect(pad + i * cw, pad * 0.4 + k * ch, cw + 1, ch + 1);
      }
    }

    // axes
    ctx.strokeStyle = 'rgba(63,208,255,0.55)'; // x-axis cyan
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(X(xMin), A(0));
    ctx.lineTo(X(xMax), A(0));
    ctx.stroke();
    ctx.strokeStyle = 'rgba(170,120,255,0.55)'; // α-axis violet
    ctx.beginPath();
    ctx.moveTo(X(0), A(aMin));
    ctx.lineTo(X(0), A(aHi));
    ctx.stroke();

    // null lines α = ±x (red)
    ctx.strokeStyle = 'rgba(255,70,70,0.9)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(X(xMin), A(xMin));
    ctx.lineTo(X(xMax), A(xMax));
    ctx.moveTo(X(xMin), A(-xMin));
    ctx.lineTo(X(xMax), A(-xMax));
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,120,120,0.9)';
    ctx.font = '11px ui-monospace, monospace';
    ctx.fillText('α = x', X(xMax) - 40, A(xMax) + 14);
    ctx.fillText('α = −x', X(xMax) - 44, A(-xMax) - 6);

    // signal trajectory (0,0) → (dx, alpha)
    const alpha = diag.phase.alpha;
    ctx.strokeStyle = 'rgba(220,230,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(X(0), A(0));
    ctx.lineTo(X(dx), A(alpha));
    ctx.stroke();

    // endpoint P = (dx, alpha), coloured by domain
    const domColor =
      diag.splitDomain === 'REAL_DOMAIN' ? '#56e39f'
      : diag.splitDomain === 'SINGULAR_BOUNDARY' ? '#ffd23b'
      : '#e23bd0';
    ctx.fillStyle = domColor;
    ctx.beginPath();
    ctx.arc(X(dx), A(alpha), 5, 0, Math.PI * 2);
    ctx.fill();

    // animated marker along trajectory, pulses on boundary
    const mp = Math.max(0, Math.min(1, progress));
    const mx = mp * dx;
    const ma = mp * alpha;
    const onBoundary = diag.splitDomain === 'SINGULAR_BOUNDARY';
    const pr = onBoundary ? 5 + 3 * (0.5 + 0.5 * Math.sin(pulse * 6)) : 4;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(X(mx), A(ma), pr, 0, Math.PI * 2);
    ctx.fill();
    if (onBoundary) {
      ctx.strokeStyle = '#ffd23b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(X(dx), A(alpha), 10 + 4 * (0.5 + 0.5 * Math.sin(pulse * 6)), 0, Math.PI * 2);
      ctx.stroke();
    }

    // cross-panel highlight ring at (x, alpha)
    if (highlight && Number.isFinite(highlight[0]) && Number.isFinite(highlight[2])) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(X(highlight[0]), A(highlight[2]), 13, 0, Math.PI * 2);
      ctx.stroke();
    }

    // labels
    ctx.fillStyle = 'rgba(180,200,230,0.85)';
    ctx.font = '12px ui-monospace, monospace';
    ctx.fillText('Split plane (x, α)  z = x + jα,  j²=1', pad, 16);
    ctx.fillStyle = domColor;
    ctx.font = '11px ui-monospace, monospace';
    ctx.fillText(
      `Δ_split = x²−α² = ${diag.deltaSplit.toFixed(2)}  [${diag.splitDomain}]`,
      X(dx) + 8,
      A(alpha) - 6,
    );
    // teal/magenta legend
    ctx.fillStyle = 'rgba(86,227,159,0.9)';
    ctx.fillText('teal: x²−α²>0 (Real)', pad, height - 22);
    ctx.fillStyle = 'rgba(226,59,208,0.9)';
    ctx.fillText('magenta: x²−α²<0 (Alpha)', pad, height - 8);
  }, [diag, progress, pulse, width, height, highlight]);

  return <canvas ref={ref} style={{ width, height, borderRadius: 8 }} />;
}


// ===================== src/components/ProjectionSpeedCanvas.tsx =====================
/**
 * ProjectionSpeedCanvas — "Kidi Light-Speed Projection".
 *
 * A faux-3D speed surface over axes  X = |dx|,  Z = |W|=|alpha|,  Y = beta_equiv.
 * Shows the glowing beta = 1 reference plane (light-speed constant c), the rising
 * speed surface beta = |dx| / sqrt(dx^2 - dW^2), the bright Kidi boundary edge
 * where |dW| = |dx|, the shaded no-real-projection region |dW| > |dx|, and the
 * current scenario marker.
 *
 * beta>1 is a PROJECTION statement inside the speculative model, not verified FTL.
 */




interface Props {
  diag: Diagnostics;
  width: number;
  height: number;
  pulse: number;
}

const CLASS_COLOR: Record<ProjectionClass, string> = {
  LIGHT_SPEED: '#3fd0ff',
  PROJECTED_SUPERLUMINAL: '#56e39f',
  KIDI_BOUNDARY: '#ffd23b',
  W_DOMAIN_NO_REAL_DT: '#e23bd0',
  UNDEFINED_DX: '#ff6b6b',
};

const CLASS_LABEL: Record<ProjectionClass, string> = {
  LIGHT_SPEED: 'LIGHT-SPEED (β=1)',
  PROJECTED_SUPERLUMINAL: 'PROJECTED SUPERLUMINAL (β>1)',
  KIDI_BOUNDARY: 'KIDI BOUNDARY (Δ_signal=0)',
  W_DOMAIN_NO_REAL_DT: 'W DOMAIN — no real projected dt',
  UNDEFINED_DX: 'UNDEFINED (dx→0)',
};

const BETA_MAX = 6;

function ProjectionSpeedCanvas({ diag, width, height, pulse }: Props) {
  const ref = useRef<HTMLCanvasElement>(null);

  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;

    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const pj = diag.projection;
    const dxAbs = Math.abs(pj.dx);
    const dwAbs = Math.abs(pj.dW);

    const xMax = Math.max(dxAbs * 1.6, dwAbs * 1.2, 6);
    const zMax = xMax;

    // oblique projection params
    const padL = 60, padT = 30, padB = 36, padR = 24;
    const plotW = width - padL - padR;
    const plotH = height - padT - padB;
    const A = (28 * Math.PI) / 180;
    const kx = (plotW * 0.62) / xMax;
    const depth = plotW * 0.32;
    const kz = depth / zMax;
    const ky = (plotH * 0.80) / BETA_MAX;
    const baseY = padT + plotH * 0.94;
    const baseX = padL + 6;
    const PX = (X: number, Z: number) => baseX + X * kx + Z * kz * Math.cos(A);
    const PY = (X: number, Z: number, Y: number) => baseY - Y * ky - Z * kz * Math.sin(A);

    // background
    ctx.fillStyle = '#0a0e16';
    ctx.fillRect(0, 0, width, height);

    // floor grid (beta=0)
    ctx.strokeStyle = 'rgba(120,140,170,0.12)';
    ctx.lineWidth = 1;
    const NX = 8, NZ = 8;
    for (let i = 0; i <= NX; i++) {
      const X = (i / NX) * xMax;
      ctx.beginPath(); ctx.moveTo(PX(X, 0), PY(X, 0, 0)); ctx.lineTo(PX(X, zMax), PY(X, zMax, 0)); ctx.stroke();
    }
    for (let k = 0; k <= NZ; k++) {
      const Z = (k / NZ) * zMax;
      ctx.beginPath(); ctx.moveTo(PX(0, Z), PY(0, Z, 0)); ctx.lineTo(PX(xMax, Z), PY(xMax, Z, 0)); ctx.stroke();
    }

    // no-real-projection region |Z| > |X| (floor triangle beyond the diagonal)
    ctx.fillStyle = 'rgba(226,59,208,0.14)';
    ctx.beginPath();
    ctx.moveTo(PX(0, 0), PY(0, 0, 0));
    ctx.lineTo(PX(0, zMax), PY(0, zMax, 0));
    ctx.lineTo(PX(xMax, zMax), PY(xMax, zMax, 0));
    // back to diagonal Z=X at X=xMax... close along Z=X
    ctx.lineTo(PX(xMax, xMax), PY(xMax, xMax, 0));
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(226,59,208,0.85)';
    ctx.font = '10px ui-monospace, monospace';
    ctx.fillText('W domain', PX(0.4, zMax * 0.78), PY(0.4, zMax * 0.78, 0));
    ctx.fillText('no real dt', PX(0.4, zMax * 0.78) , PY(0.4, zMax * 0.78, 0) + 12);

    // beta = 1 reference plane (light-speed constant c)
    ctx.fillStyle = 'rgba(63,208,255,0.10)';
    ctx.beginPath();
    ctx.moveTo(PX(0, 0), PY(0, 0, 1));
    ctx.lineTo(PX(xMax, 0), PY(xMax, 0, 1));
    ctx.lineTo(PX(xMax, zMax), PY(xMax, zMax, 1));
    ctx.lineTo(PX(0, zMax), PY(0, zMax, 1));
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(63,208,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(PX(0, 0), PY(0, 0, 1)); ctx.lineTo(PX(xMax, 0), PY(xMax, 0, 1)); ctx.stroke();
    ctx.fillStyle = '#9fe0ff';
    ctx.font = '11px ui-monospace, monospace';
    ctx.fillText('Light-speed reference · β = 1', PX(xMax * 0.06, 0), PY(xMax * 0.06, 0, 1) - 6);
    ctx.fillStyle = 'rgba(120,200,240,0.7)';
    ctx.font = '9px ui-monospace, monospace';
    ctx.fillText('cyan β=1 plane = ordinary α=0 light baseline', padL, height - 22);

    // speed surface beta = X / sqrt(X^2 - Z^2), as constant-X "fins"
    const fins = 9;
    for (let i = 1; i <= fins; i++) {
      const X = (i / fins) * xMax;
      ctx.strokeStyle = `rgba(86,227,159,${0.30 + 0.5 * (i / fins)})`;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      let started = false;
      const steps = 40;
      for (let s = 0; s <= steps; s++) {
        const Z = (s / steps) * X * 0.985;
        const d = X * X - Z * Z;
        if (d <= 1e-9) break;
        const beta = Math.min(BETA_MAX, X / Math.sqrt(d));
        const x = PX(X, Z), y = PY(X, Z, beta);
        if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // Kidi boundary edge: the diagonal Z=X, rising wall to BETA_MAX
    ctx.strokeStyle = '#ffd23b';
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.moveTo(PX(0, 0), PY(0, 0, 0));
    ctx.lineTo(PX(xMax, xMax), PY(xMax, xMax, 0));
    ctx.stroke();
    // wall at the diagonal (pulse)
    const wallPulse = 0.5 + 0.4 * Math.sin(pulse * 4);
    ctx.strokeStyle = `rgba(255,210,59,${wallPulse})`;
    ctx.lineWidth = 1.2;
    for (let s = 1; s <= 6; s++) {
      const X = (s / 6) * xMax;
      ctx.beginPath();
      ctx.moveTo(PX(X, X), PY(X, X, 0));
      ctx.lineTo(PX(X, X), PY(X, X, BETA_MAX));
      ctx.stroke();
    }
    ctx.fillStyle = '#ffd23b';
    ctx.font = '11px ui-monospace, monospace';
    ctx.fillText('Kidi Boundary  Δ_signal = 0', PX(xMax, xMax) - 150, PY(xMax, xMax, BETA_MAX) + 14);

    // axes labels
    ctx.fillStyle = 'rgba(180,200,230,0.85)';
    ctx.font = '11px ui-monospace, monospace';
    ctx.fillText('|dx|', PX(xMax, 0) + 4, PY(xMax, 0, 0) + 4);
    ctx.fillStyle = 'rgba(170,120,255,0.9)';
    ctx.fillText('|W| = |α|', PX(0, zMax) - 6, PY(0, zMax, 0) + 14);
    ctx.fillStyle = 'rgba(86,227,159,0.95)';
    ctx.save();
    ctx.translate(padL - 44, padT + plotH * 0.4);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('β = v/c', 0, 0);
    ctx.restore();

    // current marker — height depends on the projection class
    const color = CLASS_COLOR[pj.className];
    if (pj.className !== 'UNDEFINED_DX' && Number.isFinite(dxAbs)) {
      const Xc = Math.min(dxAbs, xMax);
      const Zc = Math.min(dwAbs, zMax);
      let Yc: number;
      if (pj.className === 'W_DOMAIN_NO_REAL_DT') {
        Yc = 0; // no real β — sits on the floor in the magenta no-real region
      } else if (pj.className === 'KIDI_BOUNDARY') {
        Yc = BETA_MAX; // diverging — at the top of the kidi wall
      } else {
        Yc = pj.betaEquiv.kind === 'Real' ? Math.min(BETA_MAX, pj.betaEquiv.value) : BETA_MAX;
      }
      // drop line
      ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(PX(Xc, Zc), PY(Xc, Zc, 0)); ctx.lineTo(PX(Xc, Zc), PY(Xc, Zc, Yc)); ctx.stroke();
      ctx.setLineDash([]);
      // marker
      const pulsing = pj.className === 'KIDI_BOUNDARY';
      const r = pulsing ? 5 + 3 * (0.5 + 0.5 * Math.sin(pulse * 6)) : 5;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(PX(Xc, Zc), PY(Xc, Zc, Yc), r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.2; ctx.stroke();
      if (pj.className === 'W_DOMAIN_NO_REAL_DT') {
        ctx.fillStyle = color;
        ctx.font = '9px ui-monospace, monospace';
        ctx.fillText('no real dt', PX(Xc, Zc) + 8, PY(Xc, Zc, 0));
      }
    }

    // title + readout
    ctx.fillStyle = 'rgba(180,200,230,0.9)';
    ctx.font = '12px ui-monospace, monospace';
    ctx.fillText('Kidi Light-Speed Projection', padL, 16);
    ctx.fillStyle = color;
    ctx.font = 'bold 11px ui-monospace, monospace';
    const betaText =
      pj.betaEquiv.kind === 'Real' ? `β=${pj.betaEquiv.value.toFixed(3)}`
      : pj.betaEquiv.kind === 'Singular' ? `β=Singular(σ^½)` : 'β=⊥';
    ctx.fillText(`${CLASS_LABEL[pj.className]}   ${betaText}`, padL, height - 8);
  }, [diag, width, height, pulse]);

  return <canvas ref={ref} style={{ width, height, borderRadius: 8 }} />;
}


// ===================== src/components/VWCorrelationFieldPanel.tsx =====================
/**
 * VWCorrelationFieldPanel — the Kidi V–W Correlation Field (core feasibility proof).
 *
 * A continuous feasibility map, not a single-value calculator. Reduced layer:
 * no 5D, negative time, or reverse branch needed.
 *
 * 2D map: X = η = |W|/D,  Y = β = V/c. The boundary curve  β² + η² = 1
 * separates SUBC_TOO_SLOW (β²+η²<1) from SUBC_BEATS_LIGHT (β²+η²>1, β<1, η<1).
 * η=1 is the Kidi Boundary; η>1 is NO_REAL_CORRIDOR. The live (η, β) is plotted.
 *
 * Insight: W ↑ ⇒ required V ↓, and V ↑ ⇒ required W ↓.
 * Local V stays below c — earlier arrival is geometric corridor shortening, not FTL.
 */




interface Props {
  diag: Diagnostics;
  width: number;
  height: number;
  pulse: number;
}

const VW_FIELD_COLOR: Record<VWCorrelationClass, string> = {
  SUBC_BEATS_LIGHT: '#ffd23b',
  EQUAL_TO_LIGHT_BASELINE: '#3fd0ff',
  SUBC_TOO_SLOW: '#6f9bdc',
  KIDI_BOUNDARY: '#ff9d3b',
  NO_REAL_CORRIDOR: '#e23bd0',
  LIGHT_SPEED_LIMIT: '#ffb13b',
  INVALID_INPUT: '#ff6b6b',
};

const VW_FIELD_LABEL: Record<VWCorrelationClass, string> = {
  SUBC_BEATS_LIGHT: 'SUB-C BEATS LIGHT — V<c yet beats light',
  EQUAL_TO_LIGHT_BASELINE: 'EQUAL TO LIGHT BASELINE',
  SUBC_TOO_SLOW: 'TOO SLOW — increase W or V',
  KIDI_BOUNDARY: 'KIDI BOUNDARY — D_eff→0',
  NO_REAL_CORRIDOR: 'NO REAL CORRIDOR — |W|>|dx|',
  LIGHT_SPEED_LIMIT: 'LIGHT-SPEED LIMIT (V≥c)',
  INVALID_INPUT: 'INVALID INPUT',
};

function VWCorrelationFieldPanel({ diag, width, height, pulse }: Props) {
  const ref = useRef<HTMLCanvasElement>(null);

  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const vf = diag.vwCorrelation;
    const eta = Number.isFinite(vf.eta) ? vf.eta : 0;
    const beta = Number.isFinite(vf.beta) ? vf.beta : 0;
    const etaMax = Math.max(1.1, eta + 0.2);

    const padL = 48, padT = 26, padB = 42, padR = 18;
    const plotW = width - padL - padR;
    const plotH = height - padT - padB;
    const X = (e: number) => padL + (e / etaMax) * plotW;
    const Y = (b: number) => padT + plotH - Math.max(0, Math.min(1.05, b)) * (plotH / 1.05);

    ctx.fillStyle = '#0a0e16';
    ctx.fillRect(0, 0, width, height);

    // region fill by coarse sampling of β² + η²
    const cells = 56;
    const cw = plotW / cells;
    const ch = plotH / cells;
    for (let i = 0; i < cells; i++) {
      for (let k = 0; k < cells; k++) {
        const e = ((i + 0.5) / cells) * etaMax;
        const b = (1 - (k + 0.5) / cells) * 1.05; // β up to ~1.05 (top)
        let color: string | null = null;
        if (e > 1) color = 'rgba(226,59,208,0.13)'; // no real corridor
        else if (b > 1) color = 'rgba(255,177,59,0.10)'; // V≥c light-speed limit band
        else {
          const score = b * b + e * e;
          if (Math.abs(score - 1) < 0.03) color = null; // leave boundary clear
          else if (score > 1) color = 'rgba(255,210,80,0.13)'; // beats light
          else color = 'rgba(90,130,210,0.10)'; // too slow
        }
        if (color) {
          ctx.fillStyle = color;
          ctx.fillRect(padL + i * cw, padT + k * ch, cw + 1, ch + 1);
        }
      }
    }

    // axes
    ctx.strokeStyle = 'rgba(120,140,170,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(X(0), Y(0)); ctx.lineTo(X(etaMax), Y(0));
    ctx.moveTo(X(0), Y(0)); ctx.lineTo(X(0), Y(1.05));
    ctx.stroke();

    // β = 1 ceiling (sub-c limit)
    ctx.strokeStyle = 'rgba(63,208,255,0.6)';
    ctx.setLineDash([5, 4]);
    ctx.beginPath(); ctx.moveTo(X(0), Y(1)); ctx.lineTo(X(etaMax), Y(1)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(120,200,240,0.75)';
    ctx.font = '9px ui-monospace, monospace';
    ctx.fillText('β=1 (V=c)', X(etaMax) - 58, Y(1) - 3);

    // boundary curve β² + η² = 1
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    let started = false;
    for (let s = 0; s <= 100; s++) {
      const e = (s / 100) * Math.min(1, etaMax);
      const b = Math.sqrt(Math.max(0, 1 - e * e));
      const x = X(e), y = Y(b);
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.fillStyle = '#dfe7f5';
    ctx.font = '10px ui-monospace, monospace';
    ctx.fillText('β² + η² = 1', X(0.16), Y(Math.sqrt(Math.max(0, 1 - 0.16 * 0.16))) - 6);

    // η = 1 Kidi boundary line
    if (etaMax >= 1) {
      ctx.strokeStyle = 'rgba(255,157,59,0.85)';
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(X(1), Y(0)); ctx.lineTo(X(1), Y(1.05)); ctx.stroke();
      ctx.fillStyle = '#ff9d3b';
      ctx.fillText('η=1 Kidi', X(1) + 3, Y(0.92));
    }

    // region labels
    ctx.font = '10px ui-monospace, monospace';
    ctx.fillStyle = 'rgba(255,210,80,0.9)';
    ctx.fillText('SUB-C BEATS LIGHT', X(0.12), Y(0.9));
    ctx.fillStyle = 'rgba(140,170,230,0.9)';
    ctx.fillText('too slow', X(0.1), Y(0.18));

    // current point (η, β)
    const color = VW_FIELD_COLOR[vf.className];
    if (vf.className !== 'INVALID_INPUT') {
      const px = X(Math.min(eta, etaMax));
      const py = Y(beta);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.setLineDash([2, 3]);
      ctx.beginPath(); ctx.moveTo(X(0), py); ctx.lineTo(px, py); ctx.moveTo(px, Y(0)); ctx.lineTo(px, py); ctx.stroke();
      ctx.setLineDash([]);
      const r = vf.className === 'KIDI_BOUNDARY' ? 5 + 3 * (0.5 + 0.5 * Math.sin(pulse * 6)) : 5;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.2; ctx.stroke();
      ctx.fillStyle = '#e6eefc';
      ctx.fillText(`η=${eta.toFixed(2)}, β=${beta.toFixed(2)}`, px + 8, py - 8);
    }

    // title + axis labels + field score + status
    ctx.fillStyle = 'rgba(180,200,230,0.85)';
    ctx.font = '12px ui-monospace, monospace';
    ctx.fillText('Kidi V–W Correlation Field', padL, 16);
    ctx.font = '10px ui-monospace, monospace';
    ctx.fillStyle = 'rgba(170,120,255,0.9)';
    ctx.fillText('η = |W|/D', X(etaMax) - 58, Y(0) + 16);
    ctx.save();
    ctx.translate(padL - 34, padT + plotH * 0.5);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = 'rgba(86,227,159,0.95)';
    ctx.fillText('β = V/c', 0, 0);
    ctx.restore();

    const score = Number.isFinite(vf.fieldScore) ? vf.fieldScore.toFixed(3) : '—';
    const marg = Number.isFinite(vf.margin) ? (vf.margin >= 0 ? `+${vf.margin.toFixed(3)}` : vf.margin.toFixed(3)) : '—';
    ctx.fillStyle = color;
    ctx.font = 'bold 10.5px ui-monospace, monospace';
    ctx.fillText(`β²+η²=${score} (margin ${marg}) · ${VW_FIELD_LABEL[vf.className]}`, padL, height - 8);
  }, [diag, width, height, pulse]);

  return <canvas ref={ref} style={{ width, height, borderRadius: 8 }} />;
}


// ===================== src/components/Volume3DView.tsx =====================
/**
 * Volume3DView — the (x, t, α) volume rendered with plain Three.js.
 *
 * Layers (independently toggleable): axes box, grids, worldlines, signal path,
 * send/receive markers, singular loci planes α=±x, null surfaces from the send
 * event, slice shadows. Custom orbit/pan/zoom is derived from camera.ts (no
 * OrbitControls dependency). Hover/click raycasts markers for cross-panel
 * linking. Falls back to a readable message if WebGL is unavailable.
 *
 * THREE is imported for the Vite build and resolves to the vendored UMD global
 * in the offline standalone (the import line is stripped at build time).
 */







interface LayerVisibility {
  axes: boolean;
  grids: boolean;
  loci: boolean;
  nullSurfaces: boolean;
  worldlines: boolean;
  signal: boolean;
  shadows: boolean;
  history: boolean;
}

interface Volume3DViewProps {
  diag: Diagnostics;
  events: SimEvent[];
  progress: number;
  width: number;
  height: number;
  cameraPreset: CameraPreset;
  layerVisibility: LayerVisibility;
  selectedEventId: string | null;
  onSelectEvent?: (eventId: string | null) => void;
  onHoverText?: (text: string | null) => void;
  /** show the ordinary α=0 light-speed reference baseline (default true) */
  showLightBaseline?: boolean;
}

const hex = (c: string) => new THREE.Color(c);

function Volume3DView(props: Volume3DViewProps) {
  const mountRef = useRef<HTMLDivElement>(null);
  const [webglError, setWebglError] = useState<string | null>(null);

  // persistent three objects / ephemeral state across renders
  const three = useRef<any>({});
  const cam = useRef<SphericalCamera>({ target: [2.5, 3, 0], radius: 26, azimuth: Math.PI * 0.28, elevation: Math.PI * 0.16 });
  const progressRef = useRef(props.progress);
  const diagRef = useRef(props.diag);
  const pulseRef = useRef(0);

  // ---- mount: renderer + scene + camera + input + animation loop ----------
  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;

    let renderer: any;
    try {
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    } catch (e: any) {
      setWebglError(e?.message || 'WebGL is not available in this browser.');
      return;
    }
    if (!renderer || !renderer.getContext || !renderer.getContext()) {
      setWebglError('Could not acquire a WebGL context.');
      return;
    }

    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    renderer.setPixelRatio(dpr);
    renderer.setSize(props.width, props.height);
    renderer.setClearColor(0x070a11, 1);
    mount.appendChild(renderer.domElement);
    renderer.domElement.style.borderRadius = '10px';
    renderer.domElement.style.touchAction = 'none';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, props.width / props.height, 0.1, 1000);
    scene.add(new THREE.AmbientLight(0xffffff, 0.75));
    const dir = new THREE.DirectionalLight(0xffffff, 0.6);
    dir.position.set(8, 14, 10);
    scene.add(dir);

    // layer groups
    const groups: Record<string, any> = {};
    for (const k of ['axes', 'grids', 'worldlines', 'signal', 'markers', 'loci', 'nullSurfaces', 'shadows', 'history', 'highlight']) {
      groups[k] = new THREE.Group();
      scene.add(groups[k]);
    }

    three.current = { renderer, scene, camera, groups, raycaster: new THREE.Raycaster(), pointer: new THREE.Vector2() };
    buildScene();
    applyLayers();

    // ---- custom orbit / pan / zoom ----
    let dragging: 'orbit' | 'pan' | null = null;
    let lastX = 0, lastY = 0;
    const el = renderer.domElement;

    const onDown = (e: PointerEvent) => {
      dragging = e.button === 2 || e.shiftKey ? 'pan' : 'orbit';
      lastX = e.clientX; lastY = e.clientY;
      el.setPointerCapture(e.pointerId);
      e.preventDefault();
    };
    const onMove = (e: PointerEvent) => {
      if (!dragging) { raycastHover(e); return; }
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      const c = cam.current;
      if (dragging === 'orbit') {
        c.azimuth -= dx * 0.01;
        c.elevation = clampElevation(c.elevation + dy * 0.01);
      } else {
        // pan target in the camera's screen plane
        const panScale = c.radius * 0.0016;
        const right: Vec3 = [Math.cos(c.azimuth - Math.PI / 2), 0, Math.sin(c.azimuth - Math.PI / 2)];
        c.target = [
          c.target[0] - right[0] * dx * panScale,
          c.target[1] + dy * panScale,
          c.target[2] - right[2] * dx * panScale,
        ];
      }
    };
    const onUp = (e: PointerEvent) => { dragging = null; try { el.releasePointerCapture(e.pointerId); } catch {} };
    const onWheel = (e: WheelEvent) => {
      e.preventDefault();
      cam.current.radius = Math.max(4, Math.min(120, cam.current.radius * (1 + Math.sign(e.deltaY) * 0.08)));
    };
    const onContext = (e: Event) => e.preventDefault();
    const onClick = (e: PointerEvent) => raycastClick(e);

    el.addEventListener('pointerdown', onDown);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    el.addEventListener('wheel', onWheel, { passive: false });
    el.addEventListener('contextmenu', onContext);
    el.addEventListener('click', onClick);

    // ---- animation loop ----
    let raf = 0;
    let last = performance.now();
    const loop = (now: number) => {
      const dt = (now - last) / 1000; last = now;
      pulseRef.current += dt;
      updateDynamic();
      const pos = cameraPosition(cam.current);
      camera.position.set(pos[0], pos[1], pos[2]);
      camera.lookAt(cam.current.target[0], cam.current.target[1], cam.current.target[2]);
      renderer.render(scene, camera);
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);

    return () => {
      cancelAnimationFrame(raf);
      el.removeEventListener('pointerdown', onDown);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      el.removeEventListener('wheel', onWheel);
      el.removeEventListener('contextmenu', onContext);
      el.removeEventListener('click', onClick);
      renderer.dispose();
      if (renderer.domElement.parentNode === mount) mount.removeChild(renderer.domElement);
      three.current = {};
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // keep refs fresh for the animation loop
  useEffect(() => { progressRef.current = props.progress; }, [props.progress]);

  // rebuild geometry when the diagnostics (or baseline toggle) change
  useEffect(() => {
    diagRef.current = props.diag;
    if (three.current.scene) { buildScene(); applyLayers(); recenterTarget(); }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [props.diag, props.showLightBaseline]);

  // resize
  useEffect(() => {
    const t = three.current;
    if (!t.renderer) return;
    t.renderer.setSize(props.width, props.height);
    t.camera.aspect = props.width / props.height;
    t.camera.updateProjectionMatrix();
  }, [props.width, props.height]);

  // camera preset
  useEffect(() => {
    const t = three.current;
    if (!t.scene) return;
    cam.current = presetCamera(props.cameraPreset, cam.current.target, cam.current.radius);
    if (props.cameraPreset === 'follow') recenterTarget();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [props.cameraPreset]);

  // layers
  useEffect(() => { applyLayers(); /* eslint-disable-next-line */ }, [props.layerVisibility]);

  // selection highlight
  useEffect(() => { applyHighlight(); /* eslint-disable-next-line */ }, [props.selectedEventId, props.events]);

  // ---- scene builders ------------------------------------------------------

  function clearGroup(g: any) {
    while (g.children.length) {
      const c = g.children.pop();
      c.geometry?.dispose?.();
      c.material?.dispose?.();
    }
  }

  function lineMesh(points: Vec3[], color: string, width: number, dashed = false): any {
    const geo = new THREE.BufferGeometry().setFromPoints(points.map((p) => new THREE.Vector3(p[0], p[1], p[2])));
    const mat = dashed
      ? new THREE.LineDashedMaterial({ color: hex(color), dashSize: 0.5, gapSize: 0.3, linewidth: width })
      : new THREE.LineBasicMaterial({ color: hex(color), linewidth: width });
    const line = new THREE.Line(geo, mat);
    if (dashed) line.computeLineDistances();
    return line;
  }

  function quadMesh(positions: number[], indices: number[], color: string, opacity: number): any {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();
    const mat = new THREE.MeshBasicMaterial({ color: hex(color), transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false });
    return new THREE.Mesh(geo, mat);
  }

  function buildScene() {
    const t = three.current;
    if (!t.scene) return;
    const diag = diagRef.current;
    const G = buildSceneGeometry(diag);
    const b = G.bounds;

    // axes box
    clearGroup(t.groups.axes);
    const box = new THREE.Box3(new THREE.Vector3(b.xMin, b.tMin, b.alphaMin), new THREE.Vector3(b.xMax, b.tMax, b.alphaMax));
    const boxHelper = new THREE.Box3Helper(box, hex('#2a3a5a'));
    t.groups.axes.add(boxHelper);
    // axis lines: x cyan, t white, alpha violet
    t.groups.axes.add(lineMesh([[b.xMin, b.tMin, 0], [b.xMax, b.tMin, 0]], '#3fd0ff', 2));
    t.groups.axes.add(lineMesh([[b.xMin, b.tMin, 0], [b.xMin, b.tMax, 0]], '#cfe0ff', 2));
    t.groups.axes.add(lineMesh([[b.xMin, b.tMin, b.alphaMin], [b.xMin, b.tMin, b.alphaMax]], '#aa78ff', 2));

    // grids on the three walls
    clearGroup(t.groups.grids);
    const gx = new THREE.GridHelper(Math.max(b.xMax - b.xMin, b.tMax - b.tMin), 12, 0x223049, 0x162032);
    gx.position.set((b.xMin + b.xMax) / 2, b.tMin, 0);
    t.groups.grids.add(gx);

    // worldlines
    clearGroup(t.groups.worldlines);
    t.groups.worldlines.add(lineMesh(G.worldlines[0].points, '#3fd0ff', 3)); // Bob
    t.groups.worldlines.add(lineMesh(G.worldlines[1].points, '#ff61dc', 3)); // Alice

    // loci planes α = ±x
    clearGroup(t.groups.loci);
    for (const m of G.loci) t.groups.loci.add(quadMesh(m.positions, m.indices, '#ff4646', 0.16));

    // null surfaces
    clearGroup(t.groups.nullSurfaces);
    for (const m of G.nullSurface) {
      const mesh = quadMesh(m.positions, m.indices, '#4aa3ff', 0.10);
      const wire = new THREE.LineSegments(
        new THREE.WireframeGeometry(mesh.geometry),
        new THREE.LineBasicMaterial({ color: hex('#4aa3ff'), transparent: true, opacity: 0.25 }),
      );
      t.groups.nullSurfaces.add(mesh);
      t.groups.nullSurfaces.add(wire);
    }

    // signal path (appearance from typed arrival)
    clearGroup(t.groups.signal);
    const app = appearanceForValue(diag.arrival, diag.phase.branch);
    t.groups.signal.add(lineMesh(G.signal.points, app.color, app.thickness, app.dashed));

    // Light-Speed Reference Baseline: ordinary α=0 ray (a fixed comparison ruler)
    const lb = diag.lightBaseline;
    const lbN = lb.tLightArrival.kind === 'Real' ? lb.tLightArrival.value : null;
    if (props.showLightBaseline !== false && lbN !== null) {
      const baseLine = lineMesh(
        [[diag.scenario.xBob, diag.scenario.tSend, 0], [diag.scenario.xAlice, lbN, 0]],
        '#3fd0ff', 2, true,
      );
      baseLine.userData = { baseline: true };
      t.groups.signal.add(baseLine);
    }

    // markers
    clearGroup(t.groups.markers);
    for (const mk of G.markers) {
      const isSend = mk.id === 'send';
      const color = isSend ? '#3fd0ff' : appearanceForValue(diag.arrival, diag.phase.branch).color;
      const sph = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 16, 16),
        new THREE.MeshBasicMaterial({ color: hex(color) }),
      );
      sph.position.set(mk.position[0], mk.position[1], mk.position[2]);
      sph.userData = { marker: mk.id, eventType: isSend ? 'SEND' : diag.contradiction ? 'FEEDBACK_CONTRADICTION' : diag.reverse ? 'REVERSE_ARRIVAL' : 'RECEIVE', label: mk.label, pos: mk.position };
      t.groups.markers.add(sph);
    }

    // slice shadows: project signal onto x-t wall (α=alphaMin) and x-α wall (t=tMin)
    clearGroup(t.groups.shadows);
    const s = G.signal.points;
    const shadowMat = (c: string) => new THREE.LineDashedMaterial({ color: hex(c), opacity: 0.4, transparent: true, dashSize: 0.4, gapSize: 0.25 });
    const xtShadow = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(s.map((p) => new THREE.Vector3(p[0], p[1], b.alphaMin))),
      shadowMat('#56e39f'),
    );
    xtShadow.computeLineDistances();
    const xaShadow = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(s.map((p) => new THREE.Vector3(p[0], b.tMin, p[2]))),
      shadowMat('#e23bd0'),
    );
    xaShadow.computeLineDistances();
    t.groups.shadows.add(xtShadow);
    t.groups.shadows.add(xaShadow);

    // history trails (faint prior arrivals from the event log)
    clearGroup(t.groups.history);
    for (const ev of props.events) {
      const arr = ev.payload?.arrival as Vec3 | undefined;
      const snd = ev.payload?.send as Vec3 | undefined;
      if (arr && snd && arr.every(Number.isFinite)) {
        const trail = lineMesh([snd, arr], '#5b6b86', 1);
        trail.material.transparent = true;
        trail.material.opacity = 0.25;
        t.groups.history.add(trail);
      }
    }

    // highlight holder
    clearGroup(t.groups.highlight);
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.5, 0.06, 10, 28),
      new THREE.MeshBasicMaterial({ color: hex('#ffffff') }),
    );
    ring.visible = false;
    ring.name = 'selRing';
    t.groups.highlight.add(ring);

    applyHighlight();
  }

  function updateDynamic() {
    const t = three.current;
    if (!t.scene) return;
    const diag = diagRef.current;
    const G = buildSceneGeometry(diag);
    const p = Math.max(0, Math.min(1, progressRef.current));
    const send = G.signal.points[0];
    const end = G.signal.points[1];
    // moving marker
    if (!t.movingMarker) {
      t.movingMarker = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 12), new THREE.MeshBasicMaterial({ color: 0xffffff }));
      t.groups.signal.add(t.movingMarker);
    }
    t.movingMarker.position.set(
      send[0] + p * (end[0] - send[0]),
      send[1] + p * (end[1] - send[1]),
      send[2] + p * (end[2] - send[2]),
    );
    // boundary pulse on the loci group when on a singular boundary
    const onBoundary = diag.splitDomain === 'SINGULAR_BOUNDARY' || diag.signal.domain === 'SINGULAR_BOUNDARY';
    const pulse = onBoundary ? 0.6 + 0.4 * Math.sin(pulseRef.current * 5) : 0.16;
    t.groups.loci.children.forEach((m: any) => { if (m.material) m.material.opacity = onBoundary ? pulse * 0.4 : 0.16; });
    // selection ring pulse
    const ring = t.groups.highlight.children.find((c: any) => c.name === 'selRing');
    if (ring && ring.visible) ring.rotation.z += 0.05;
  }

  function applyLayers() {
    const t = three.current;
    if (!t.groups) return;
    const v = props.layerVisibility;
    t.groups.axes.visible = v.axes;
    t.groups.grids.visible = v.grids;
    t.groups.worldlines.visible = v.worldlines;
    t.groups.signal.visible = v.signal;
    t.groups.markers.visible = v.signal;
    t.groups.loci.visible = v.loci;
    t.groups.nullSurfaces.visible = v.nullSurfaces;
    t.groups.shadows.visible = v.shadows;
    t.groups.history.visible = v.history;
  }

  function recenterTarget() {
    const diag = diagRef.current;
    const G = buildSceneGeometry(diag);
    const send = G.signal.points[0];
    const end = G.signal.points[1];
    cam.current.target = [(send[0] + end[0]) / 2, (send[1] + end[1]) / 2, (send[2] + end[2]) / 2];
  }

  function eventPoint(ev: SimEvent): Vec3 | null {
    const arr = ev.payload?.arrival as Vec3 | undefined;
    const snd = ev.payload?.send as Vec3 | undefined;
    if (ev.type === 'SEND' || ev.type === 'PHASE_CHANGE') return snd ?? null;
    if (arr && arr.every(Number.isFinite)) return arr;
    return snd ?? null;
  }

  function applyHighlight() {
    const t = three.current;
    if (!t.groups) return;
    const ring = t.groups.highlight.children.find((c: any) => c.name === 'selRing');
    if (!ring) return;
    const ev = props.events.find((e) => e.id === props.selectedEventId);
    const pt = ev ? eventPoint(ev) : null;
    if (pt) {
      ring.position.set(pt[0], pt[1], pt[2]);
      ring.visible = true;
    } else {
      ring.visible = false;
    }
  }

  // ---- raycasting ----------------------------------------------------------

  function setPointer(e: PointerEvent) {
    const t = three.current;
    const rect = t.renderer.domElement.getBoundingClientRect();
    t.pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    t.pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  }

  function pickMarker(e: PointerEvent): any | null {
    const t = three.current;
    if (!t.camera) return null;
    setPointer(e);
    t.raycaster.setFromCamera(t.pointer, t.camera);
    const hits = t.raycaster.intersectObjects(t.groups.markers.children, false);
    return hits.length ? hits[0].object : null;
  }

  function raycastHover(e: PointerEvent) {
    const obj = pickMarker(e);
    if (!props.onHoverText) return;
    if (obj) {
      const pos = obj.userData.pos as Vec3;
      const app = appearanceForValue(diagRef.current.arrival, diagRef.current.phase.branch);
      props.onHoverText(`${obj.userData.label} @ (x=${pos[0].toFixed(2)}, t=${pos[1].toFixed(2)}, α=${pos[2].toFixed(2)}) — ${app.label}`);
    } else {
      props.onHoverText(null);
    }
  }

  function raycastClick(e: PointerEvent) {
    const obj = pickMarker(e);
    if (!obj || !props.onSelectEvent) return;
    const wantType = obj.userData.eventType as string;
    const ev = props.events.find((x) => x.type === wantType) ?? props.events.find((x) => x.payload && (x.payload as any).send);
    props.onSelectEvent(ev ? ev.id : null);
  }

  // ---- render --------------------------------------------------------------

  const domain = props.diag.splitDomain;
  return (
    <div className="volume3d">
      <div className="panel-head">
        <h3>3D Volume (x, t, α)</h3>
        <span className="domain-pill" style={{ color: DOMAIN_COLORS[domain] }}>{domain}</span>
      </div>
      {webglError ? (
        <div className="webgl-fallback" role="alert">
          3D view unavailable: {webglError}
          <div className="webgl-fallback-sub">The 2D spacetime and alpha-plane slices remain fully usable.</div>
        </div>
      ) : (
        <div
          ref={mountRef}
          className="volume3d-canvas"
          style={{ width: props.width, height: props.height }}
          role="img"
          aria-label={`3D volume of x, t and alpha. Current split-complex domain ${domain}. Drag to orbit, wheel to zoom.`}
        />
      )}
      <div className="volume3d-hint">drag = orbit · shift/right-drag = pan · wheel = zoom · click marker = select event</div>
    </div>
  );
}

          <label>send t{numField(p.scenario.tSend, (n) => p.setScenario({ ...p.scenario, tSend: n }), 1, 'send time')}</label>

          />
          {numField(p.speed, p.setSpeed, 0.1, 'animation speed value')}
        </div>
      </div>

      <div className="ctl-block">
        <div className="ctl-title">Display</div>
        <label className="checkbox">
          <input type="checkbox" checked={p.showLightBaseline} onChange={(e) => p.setShowLightBaseline(e.target.checked)} />

        <label className="checkbox">

          Show sub-c corridor path (gold)
        </label>
      </div>

      <div className="ctl-block">
        <div className="ctl-title">3D camera</div>
        <div className="preset-buttons">
          {ALL_PRESETS.map((preset) => (
            <button
              key={preset}

      <div className="ctl-block">
        <LayerToggleGroup visibility={p.layerVisibility} onToggle={p.onToggleLayer} />
      </div>

      <div className="ctl-block">
        <div className="ctl-title">Verification</div>
        <button className="test-btn" onClick={p.onRunTests}>Run self-tests</button>
        {p.testResults && (
          <div className="test-results">

            {p.testResults.map((t, i) => (
              <div key={i} className={t.pass ? 'test-row pass' : 'test-row fail'}>
                <span>{t.pass ? '✓' : '✗'}</span> {t.name}
                {t.detail && <span className="test-detail"> — {t.detail}</span>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}


// ===================== src/components/TimeParadoxLab.tsx =====================
/**
 * TimeParadoxLab — top-level component. Owns scenario + phase + animation +
 * selection + camera + layer state, drives the timeline with requestAnimationFrame,
 * and composes the six WO panels: control panel, 2D spacetime slice, 2D
 * alpha-plane slice, 3D (x,t,α) volume, diagnostics, and event log.
 */




















const DURATION = 2.6; // seconds for a full traversal at speed 1
const clampN = (v: number, lo: number, hi: number) => Math.max(lo, Math.min(hi, v));

const DEFAULT_LAYERS: LayerVisibility = {
  axes: true,
  grids: true,
  loci: true,
  nullSurfaces: true,
  worldlines: true,
  signal: true,
  shadows: true,
  history: false,
};

function eventWorldPoint(ev: SimEvent | null): Vec3 | null {
  if (!ev || !ev.payload) return null;
  const arr = ev.payload.arrival as Vec3 | undefined;
  const snd = ev.payload.send as Vec3 | undefined;
  if (ev.type === 'SEND' || ev.type === 'PHASE_CHANGE') return snd ?? null;
  if (arr && arr.every(Number.isFinite)) return arr;
  return snd ?? null;
}

function TimeParadoxLab() {
  const [scenario, setScenario] = useState<Scenario>(DEFAULT_SCENARIO);
  const [alpha, setAlphaRaw] = useState(0);
  const [branch, setBranchRaw] = useState<Branch>('+');
  const [closeLoop, setCloseLoopRaw] = useState(false);
  const [activePhaseId, setActivePhaseId] = useState<string | null>('ordinary');

  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [clock, setClock] = useState(0);
  const [speed, setSpeed] = useState(1);

  const [events, setEvents] = useState<SimEvent[]>([]);
  const [testResults, setTestResults] = useState<TestResult[] | null>(null);
  const [selectedEventId, setSelectedEventId] = useState<string | null>(null);
  const [hoverText, setHoverText] = useState<string | null>(null);
  const [cameraPreset, setCameraPreset] = useState<CameraPreset>('iso');
  const [layers, setLayers] = useState<LayerVisibility>(DEFAULT_LAYERS);
  const [helpOpen, setHelpOpen] = useState(false);
  const [wLabel, setWLabel] = useState(true);
  const [showLightBaseline, setShowLightBaseline] = useState(true);
  const [showSubCPath, setShowSubCPath] = useState(true);
  const seqRef = useRef(0);

  const setAlpha = (a: number) => { setAlphaRaw(a); setActivePhaseId(null); };
  const setBranch = (b: Branch) => { setBranchRaw(b); setActivePhaseId(null); };
  const setCloseLoop = (b: boolean) => { setCloseLoopRaw(b); setActivePhaseId(null); };

  const livePhase: Phase = useMemo(() => {
    const named = activePhaseId ? DEMO_PHASES.find((d) => d.id === activePhaseId) : null;
    return {
      id: activePhaseId ?? 'custom',
      name: named ? named.name : `Custom (α=${alpha.toFixed(2)}, ${branch})`,
      alpha,
      branch,
      closeLoop,
      expectedArrival: named ? named.expectedArrival : NaN,
      blurb: named ? named.blurb : 'Custom phase from the sliders.',
    };
  }, [activePhaseId, alpha, branch, closeLoop]);

  const diag = useMemo(() => evaluatePhase(scenario, livePhase), [scenario, livePhase]);

  const selectedEvent = useMemo(
    () => events.find((e) => e.id === selectedEventId) ?? null,
    [events, selectedEventId],
  );
  const highlight = useMemo(() => eventWorldPoint(selectedEvent), [selectedEvent]);

  const logPhase = (ph: Phase) => {
    const d = evaluatePhase(scenario, ph);
    const evs = buildEvents(d, seqRef.current);
    seqRef.current += evs.length;
    setEvents((prev) => [...prev, ...evs]);
  };

  const runLive = () => { setProgress(0); logPhase(livePhase); setPlaying(true); };

  const onSelectPhase = (ph: Phase) => {
    setActivePhaseId(ph.id);
    setAlphaRaw(ph.alpha);
    setBranchRaw(ph.branch);
    setCloseLoopRaw(!!ph.closeLoop);
    setProgress(0);
    logPhase(ph);
    setPlaying(true);
  };

  const onPlay = () => { if (progress >= 1 - 1e-6 || progress === 0) runLive(); else setPlaying(true); };
  const onPause = () => setPlaying(false);
  const onReset = () => { setPlaying(false); setProgress(0); setEvents([]); setSelectedEventId(null); seqRef.current = 0; };

  const onExport = () => {
    if (events.length === 0) return;
    downloadEventLog(events);
    const ev: SimEvent = {
      id: `evt-${String(seqRef.current).padStart(4, '0')}`,
      seq: seqRef.current,
      type: 'EXPORT',
      level: 'info',
      phaseId: livePhase.id,
      message: `Exported ${events.length} events as JSON`,
      timestamp: Date.now() / 1000,
      scenario: snapshotOf(scenario, livePhase),
      typedState: Real(events.length),
    };
    seqRef.current += 1;
    setEvents((prev) => [...prev, ev]);
  };

  const onToggleLayer = (k: keyof LayerVisibility) => setLayers((prev) => ({ ...prev, [k]: !prev[k] }));
  const cycleCamera = () => setCameraPreset((prev) => ALL_PRESETS[(ALL_PRESETS.indexOf(prev) + 1) % ALL_PRESETS.length]);
  const onRunTests = () => setTestResults(runSelfTests());

  // keyboard shortcuts (kept fresh via a ref so the listener stays stable)
  const actions = useRef<any>({});
  actions.current = { onPlay, onPause, onReset, onExport, cycleCamera, onSelectPhase, onToggleLayer, setHelpOpen, playing };
  useEffect(() => {
    const onKey = (e: KeyboardEvent) => {
      const tag = (e.target as HTMLElement)?.tagName;
      if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
      const a = actions.current;
      if (e.key === ' ') { e.preventDefault(); a.playing ? a.onPause() : a.onPlay(); }
      else if (e.key === 'r' || e.key === 'R') a.onReset();
      else if (e.key === 'e' || e.key === 'E') a.onExport();
      else if (e.key === 'c' || e.key === 'C') a.cycleCamera();
      else if (e.key === 'l' || e.key === 'L') a.onToggleLayer('history');
      else if (e.key === '?') a.setHelpOpen((v: boolean) => !v);
      else if (e.key >= '1' && e.key <= '5') {
        const idx = parseInt(e.key, 10) - 1;
        if (DEMO_PHASES[idx]) a.onSelectPhase(DEMO_PHASES[idx]);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // animation loop
  useEffect(() => {
    const boundaryPulse = diag.splitDomain === 'SINGULAR_BOUNDARY';
    if (!playing && !boundaryPulse) return;
    let raf = 0;
    let last = performance.now();
    const loop = (now: number) => {
      const dt = (now - last) / 1000;
      last = now;
      setClock((c) => c + dt);
      if (playing) setProgress((pr) => Math.min(1, pr + (dt * speed) / DURATION));
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [playing, speed, diag.splitDomain]);

  useEffect(() => { if (playing && progress >= 1 - 1e-6) setPlaying(false); }, [progress, playing]);

  // responsive sizes
  const stCard = useElementSize<HTMLDivElement>();
  const apCard = useElementSize<HTMLDivElement>();
  const psCard = useElementSize<HTMLDivElement>();
  const corrCard = useElementSize<HTMLDivElement>();
  const volCard = useElementSize<HTMLDivElement>();
  const sliceH = (w: number) => clampN(Math.round(w * 0.72), 340, 560);
  const projH = clampN(Math.round(psCard.size.width * 0.62), 320, 480);
  const corrH = clampN(Math.round(corrCard.size.width * 0.62), 320, 480);
  const volH = clampN(Math.round(volCard.size.width * 0.52), 460, 760);

  return (
    <div className="lab">
      <header className="lab-header">
        <div>
          <h1>TimeParadoxLab 3D</h1>
          <div className="subtitle">
            5D singular-spacetime simulator · split-complex geometry · (x,t,α) volume · typed singular states
          </div>
        </div>
        <div className="disclaimer">
          Research visualisation, not verified physics. The α-axis is a modeling coordinate
          for singular structure; +dα² is a speculative two-time signature, not standard SR.
        </div>
      </header>

      <div className="lab-grid">
        <aside className="col-left">
          <ControlPanel
            scenario={scenario} setScenario={setScenario}
            alpha={alpha} setAlpha={setAlpha}
            branch={branch} setBranch={setBranch}
            closeLoop={closeLoop} setCloseLoop={setCloseLoop}
            phases={DEMO_PHASES} activePhaseId={activePhaseId} onSelectPhase={onSelectPhase}
            playing={playing} onPlay={onPlay} onPause={onPause} onReset={onReset}
            speed={speed} setSpeed={setSpeed}
            onRunTests={onRunTests} testResults={testResults}
            cameraPreset={cameraPreset} setCameraPreset={setCameraPreset}
            layerVisibility={layers} onToggleLayer={onToggleLayer}
            wLabel={wLabel} setWLabel={setWLabel}
            showLightBaseline={showLightBaseline} setShowLightBaseline={setShowLightBaseline}
            showSubCPath={showSubCPath} setShowSubCPath={setShowSubCPath}
            onHelp={() => setHelpOpen(true)}
          />
        </aside>

        <main className="col-center">
          <div className="slice-row">
            <div ref={stCard.ref} className="canvas-card">
              <SpacetimeCanvas diag={diag} progress={progress} width={stCard.size.width} height={sliceH(stCard.size.width)} highlight={highlight} showLightBaseline={showLightBaseline} showSubCPath={showSubCPath} />
            </div>
            <div ref={apCard.ref} className="canvas-card">
              <AlphaPlaneCanvas diag={diag} progress={progress} pulse={clock} width={apCard.size.width} height={sliceH(apCard.size.width)} highlight={highlight} />
            </div>
          </div>

          <div className="slice-row">
            <div ref={psCard.ref} className="canvas-card">
              <ProjectionSpeedCanvas diag={diag} width={psCard.size.width} height={projH} pulse={clock} />
            </div>
            <div ref={corrCard.ref} className="canvas-card">
              <VWCorrelationFieldPanel diag={diag} width={corrCard.size.width} height={corrH} pulse={clock} />
            </div>
          </div>

          <div ref={volCard.ref} className="panel volume-wrap">
            <Volume3DView
              diag={diag} events={events} progress={progress}
              width={volCard.size.width} height={volH}
              cameraPreset={cameraPreset} layerVisibility={layers}
              selectedEventId={selectedEventId}
              onSelectEvent={setSelectedEventId}
              onHoverText={setHoverText}
              showLightBaseline={showLightBaseline}
            />
          </div>

          <EventLog events={events} selectedEventId={selectedEventId} onSelectEvent={setSelectedEventId} onExport={onExport} />
        </main>

        <aside className="col-right">
          <DiagnosticsPanel diag={diag} />
          <HoverInspector diag={diag} hoverText={hoverText} selectedEvent={selectedEvent} />
          <div className="panel">
            <h3>3D legend</h3>
            <VolumeLegend />
          </div>
        </aside>
      </div>

      <HelpOverlay open={helpOpen} onClose={() => setHelpOpen(false)} />
    </div>
  );
}


// ===================== bootstrap =====================
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(TimeParadoxLab)
);

</script>

<script>
(function () {
  function fail(err) {
    var root = document.getElementById('root');
    root.innerHTML = '<div class="boot-error">TimeParadoxLab failed to start:\n\n' +
      ((err && err.message) ? err.message : String(err)) + '</div>';
    console.error(err);
  }
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    return fail(new Error('Vendored React/ReactDOM not found. Keep the vendor/ folder next to this file.'));
  }
  if (typeof Babel === 'undefined') {
    return fail(new Error('Vendored Babel not found. Keep vendor/babel.min.js next to this file.'));
  }
  if (typeof THREE === 'undefined') {
    return fail(new Error('Vendored Three.js not found. Keep vendor/three.min.js next to this file.'));
  }
  try {
    var src = document.getElementById('appsrc').textContent;
    var out = Babel.transform(src, {
      filename: 'TimeParadoxLab.tsx',
      presets: [
        ['typescript', { allExtensions: true, isTSX: true }],
        ['react', { runtime: 'classic' }]
      ]
    }).code;
    new Function(out)();
  } catch (err) {
    fail(err);
  }
})();
</script>
</body>
</html>
